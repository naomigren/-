<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#edeef4">
<meta name="apple-mobile-web-app-title" content="Piano Journey">
<link rel="manifest" href="./piano-manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png.jpeg">
<title>Piano Journey ✦ 钢琴打卡</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400&display=swap');

:root {
  --bg: #edeef4;
  --bg-card: rgba(255,255,255,0.68);
  --bg-card-solid: #f6f6fa;
  --silver: #b0b4c4;
  --silver-light: #d0d3de;
  --blue: #96a6c8;
  --blue-light: #bfcce6;
  --blue-pale: #dce3f0;
  --blue-deep: #7688b2;
  --purple: #b0a3c8;
  --purple-light: #cfc6e0;
  --purple-pale: #e2dced;
  --purple-deep: #8f81aa;
  --text: #484858;
  --text-light: #8888a0;
  --text-heading: #3a3a50;
  --glow: rgba(150,166,200,0.3);
  --glow-purple: rgba(176,163,200,0.25);
  --border: rgba(176,180,196,0.3);
  --border-light: rgba(176,180,196,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  font-weight: 300;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ═══ Cosmic Background ═══ */
.cosmos {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.nebula {
  position: absolute; border-radius: 50%; filter: blur(90px);
}
.nebula-1 { width: 420px; height: 420px; top: -80px; right: -60px; background: radial-gradient(circle, rgba(191,204,230,0.5), transparent 70%); }
.nebula-2 { width: 500px; height: 380px; bottom: -40px; left: -120px; background: radial-gradient(circle, rgba(207,198,224,0.45), transparent 70%); }
.nebula-3 { width: 300px; height: 300px; top: 35%; left: 40%; background: radial-gradient(circle, rgba(220,227,240,0.35), transparent 70%); }
.nebula-4 { width: 200px; height: 200px; top: 60%; right: 10%; background: radial-gradient(circle, rgba(226,220,237,0.3), transparent 70%); }

.star {
  position: absolute; border-radius: 50%; background: var(--silver);
  animation: twinkle 3s ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.15; transform: scale(1); }
  100% { opacity: 0.6; transform: scale(1.4); }
}

/* floating music notes */
.float-note {
  position: fixed; pointer-events: none; z-index: 0;
  color: var(--blue-light); opacity: 0.1; font-size: 1.6rem;
  animation: floatUp 25s linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
  8% { opacity: 0.1; }
  92% { opacity: 0.1; }
  100% { transform: translateY(-8vh) rotate(25deg); opacity: 0; }
}

/* ═══ Layout ═══ */
.app {
  position: relative; z-index: 1;
  max-width: 520px; margin: 0 auto;
  padding: 48px 20px 100px;
}

/* ═══ Header ═══ */
.header { text-align: center; margin-bottom: 36px; }
.header-deco {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 14px; color: var(--blue); opacity: 0.45; font-size: 0.9rem;
}
.header-deco .line {
  width: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue-light));
}
.header-deco .line:last-child {
  background: linear-gradient(90deg, var(--blue-light), transparent);
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem; font-weight: 400; color: var(--text-heading);
  letter-spacing: 1px; margin-bottom: 4px;
}
.header .subtitle {
  font-size: 0.78rem; color: var(--text-light); letter-spacing: 6px; font-weight: 300;
}

/* ═══ Level Banner ═══ */
.level-banner {
  background: linear-gradient(135deg, rgba(255,255,255,0.75), rgba(240,240,250,0.7));
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-light);
  border-radius: 22px; padding: 24px 24px 20px;
  margin-bottom: 20px; text-align: center;
  position: relative; overflow: hidden;
  box-shadow: 0 2px 20px rgba(150,166,200,0.1);
}
.level-banner::before {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 100px; height: 100px; border-radius: 50%;
  background: radial-gradient(circle, rgba(191,204,230,0.25), transparent 70%);
  pointer-events: none;
}
.level-banner::after {
  content: ''; position: absolute; bottom: -20px; left: -20px;
  width: 80px; height: 80px; border-radius: 50%;
  background: radial-gradient(circle, rgba(207,198,224,0.2), transparent 70%);
  pointer-events: none;
}
.level-label {
  font-size: 0.68rem; color: var(--text-light); letter-spacing: 3px; margin-bottom: 6px;
  position: relative;
}
.level-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem; color: var(--blue-deep); font-weight: 400; margin-bottom: 2px;
  position: relative;
}
.level-sub {
  font-size: 0.75rem; color: var(--purple-deep); margin-bottom: 14px;
  position: relative;
}
.progress-track {
  width: 100%; height: 5px; background: var(--blue-pale);
  border-radius: 3px; overflow: hidden; position: relative;
}
.progress-fill {
  height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  background: linear-gradient(90deg, var(--blue), var(--purple));
  box-shadow: 0 0 8px var(--glow);
}
.progress-info {
  display: flex; justify-content: space-between; margin-top: 8px;
  font-size: 0.7rem; color: var(--text-light);
  font-family: 'JetBrains Mono', monospace; font-weight: 300;
  position: relative;
}

/* ═══ Stats Row — always 3 cols ═══ */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-light); border-radius: 16px;
  padding: 16px 8px; text-align: center;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: attr(data-icon);
  position: absolute; top: 6px; right: 8px;
  font-size: 0.7rem; opacity: 0.35;
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.5rem; font-weight: 400; color: var(--text-heading);
  line-height: 1.2;
}
.stat-unit { font-size: 0.65rem; color: var(--text-light); margin-left: 1px; }
.stat-label {
  font-size: 0.68rem; color: var(--text-light); margin-top: 2px; letter-spacing: 1px;
}

/* ═══ Cards ═══ */
.card {
  background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-light); border-radius: 20px;
  padding: 24px 20px; margin-bottom: 18px;
  box-shadow: 0 1px 12px rgba(150,166,200,0.06);
}
.card-title {
  font-size: 0.72rem; letter-spacing: 3px; color: var(--text-light);
  margin-bottom: 18px; font-weight: 400;
  display: flex; align-items: center; gap: 8px;
}
.card-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border-light);
}

/* ═══ Tabs ═══ */
.tab-bar {
  display: flex; gap: 3px; margin-bottom: 20px;
  background: rgba(176,180,196,0.1); border-radius: 14px; padding: 3px;
}
.tab-btn {
  flex: 1; padding: 9px 4px; border: none; background: none;
  border-radius: 11px; font-size: 0.75rem; color: var(--text-light);
  cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.3s; letter-spacing: 1px;
}
.tab-btn.active {
  background: rgba(255,255,255,0.85); color: var(--text-heading);
  box-shadow: 0 1px 8px rgba(0,0,0,0.04);
}
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ═══ Check-in ═══ */
.checkin-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
}
.time-input-group { display: flex; flex-direction: column; gap: 5px; }
.time-input-group label {
  font-size: 0.7rem; color: var(--text-light); letter-spacing: 1px;
}
.time-input {
  background: rgba(150,166,200,0.08); border: 1px solid var(--border-light);
  border-radius: 12px; padding: 11px 14px; font-size: 0.95rem;
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  outline: none; transition: all 0.3s; width: 100%;
}
.time-input:focus { border-color: var(--blue); background: rgba(150,166,200,0.12); }

.tags-area { margin-bottom: 16px; }
.tags-label { font-size: 0.7rem; color: var(--text-light); letter-spacing: 1px; margin-bottom: 6px; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
.tag {
  padding: 5px 14px; border-radius: 20px; font-size: 0.75rem;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-light); cursor: pointer; transition: all 0.25s;
  font-family: 'Noto Sans SC', sans-serif;
}
.tag:hover { border-color: var(--blue); color: var(--blue-deep); }
.tag.active {
  background: linear-gradient(135deg, var(--blue-pale), var(--purple-pale));
  border-color: var(--blue-light); color: var(--text-heading);
}

.note-input {
  width: 100%; background: rgba(150,166,200,0.06); border: 1px solid var(--border-light);
  border-radius: 12px; padding: 11px 14px; font-size: 0.85rem;
  color: var(--text); resize: none; height: 56px;
  font-family: 'Noto Sans SC', sans-serif; outline: none; transition: all 0.3s;
  margin-bottom: 16px;
}
.note-input:focus { border-color: var(--blue); background: rgba(150,166,200,0.1); }
.note-input::placeholder { color: var(--silver-light); }

.checkin-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border: none; border-radius: 14px; color: rgba(255,255,255,0.95);
  font-size: 0.95rem; font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; letter-spacing: 2px; font-weight: 400;
  transition: all 0.25s;
  box-shadow: 0 4px 18px var(--glow), 0 2px 8px var(--glow-purple);
}
.checkin-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--glow); }
.checkin-btn:active { transform: scale(0.98); }

/* ═══ Calendar ═══ */
.cal-nav {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
}
.cal-nav button {
  background: none; border: none; color: var(--blue-deep); cursor: pointer;
  font-size: 1rem; padding: 4px 12px; border-radius: 8px; transition: background 0.2s;
}
.cal-nav button:hover { background: rgba(150,166,200,0.1); }
.cal-month {
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
  color: var(--text-heading); font-weight: 400;
}
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 6px;
}
.cal-weekdays span {
  font-size: 0.65rem; color: var(--text-light); letter-spacing: 1px; padding: 3px 0;
}
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 10px; font-size: 0.78rem; color: var(--text-light);
  font-family: 'JetBrains Mono', monospace; position: relative; cursor: default;
  transition: all 0.2s;
}
.cal-day.today {
  color: var(--blue-deep); font-weight: 500;
  box-shadow: inset 0 0 0 1.5px var(--blue-light);
}
.cal-day.checked {
  background: linear-gradient(135deg, rgba(150,166,200,0.22), rgba(176,163,200,0.22));
  color: var(--text-heading); font-weight: 500;
}
.cal-day.checked::after {
  content: '♪'; position: absolute; top: 1px; right: 3px;
  font-size: 0.45rem; color: var(--purple);
}

/* ═══ Pieces ═══ */
.piece-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border-light);
}
.piece-item:last-child { border-bottom: none; }
.piece-status { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.piece-status.learning { background: var(--blue); }
.piece-status.practicing { background: var(--purple); }
.piece-status.mastered { background: var(--silver); }
.piece-name { flex: 1; font-size: 0.85rem; color: var(--text); }
.piece-actions { display: flex; gap: 2px; }
.piece-cycle-btn, .piece-del-btn {
  background: none; border: none; cursor: pointer; font-size: 0.7rem;
  padding: 3px 7px; border-radius: 6px; color: var(--text-light);
  transition: all 0.2s;
}
.piece-cycle-btn:hover { background: rgba(150,166,200,0.12); color: var(--blue-deep); }
.piece-del-btn:hover { background: rgba(200,140,140,0.1); color: #b08a8a; }
.add-piece-row { display: flex; gap: 8px; margin-top: 12px; }
.add-piece-input {
  flex: 1; background: rgba(150,166,200,0.06); border: 1px solid var(--border-light);
  border-radius: 10px; padding: 9px 12px; font-size: 0.82rem;
  color: var(--text); font-family: 'Noto Sans SC', sans-serif; outline: none;
}
.add-piece-input:focus { border-color: var(--blue); }
.add-piece-btn {
  background: rgba(150,166,200,0.1); border: 1px solid var(--border-light);
  border-radius: 10px; padding: 9px 16px; color: var(--blue-deep);
  cursor: pointer; font-size: 0.82rem; font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}
.add-piece-btn:hover { background: rgba(150,166,200,0.18); }

/* ═══ Chart ═══ */
.chart-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.chart-label { width: 44px; text-align: right; font-size: 0.68rem; color: var(--text-light); flex-shrink: 0; }
.chart-track { flex: 1; height: 16px; background: rgba(150,166,200,0.06); border-radius: 8px; overflow: hidden; }
.chart-fill {
  height: 100%; border-radius: 8px; transition: width 0.6s ease;
  display: flex; align-items: center; justify-content: flex-end; padding-right: 7px;
  font-size: 0.58rem; color: rgba(255,255,255,0.9); font-family: 'JetBrains Mono', monospace;
  min-width: 28px;
}
.chart-fill.c0 { background: linear-gradient(90deg, var(--blue-pale), var(--blue)); }
.chart-fill.c1 { background: linear-gradient(90deg, var(--purple-pale), var(--purple)); }
.chart-fill.c2 { background: linear-gradient(90deg, var(--silver-light), var(--silver)); }
.chart-fill.c3 { background: linear-gradient(90deg, var(--blue-pale), var(--purple-light)); }
.chart-fill.c4 { background: linear-gradient(90deg, var(--purple-pale), var(--blue-light)); }

/* ═══ Badges ═══ */
.badges-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.badge {
  text-align: center; padding: 14px 4px 10px; border-radius: 14px;
  border: 1px solid var(--border-light); transition: all 0.3s;
}
.badge.unlocked {
  background: linear-gradient(135deg, rgba(191,204,230,0.15), rgba(207,198,224,0.15));
  border-color: var(--blue-light);
}
.badge.locked { opacity: 0.3; filter: grayscale(0.5); }
.badge-icon { font-size: 1.4rem; margin-bottom: 2px; }
.badge-name { font-size: 0.65rem; color: var(--text-light); }
.badge-req { font-size: 0.55rem; color: var(--silver); margin-top: 1px; }

/* ═══ Roadmap ═══ */
.roadmap-item {
  display: flex; gap: 14px; padding: 12px 0;
  border-bottom: 1px solid var(--border-light);
}
.roadmap-item:last-child { border-bottom: none; }
.roadmap-level {
  width: 40px; height: 40px; border-radius: 12px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  color: var(--text-light); border: 1px solid var(--border-light);
  transition: all 0.3s;
}
.roadmap-item.current .roadmap-level {
  background: linear-gradient(135deg, var(--blue-light), var(--purple-light));
  border-color: transparent; color: var(--text-heading); font-weight: 500;
  box-shadow: 0 2px 10px var(--glow);
}
.roadmap-item.passed .roadmap-level {
  background: rgba(150,166,200,0.1); border-color: var(--blue-light); color: var(--blue-deep);
}
.roadmap-info { flex: 1; }
.roadmap-name { font-size: 0.85rem; color: var(--text); margin-bottom: 2px; }
.roadmap-desc { font-size: 0.72rem; color: var(--text-light); line-height: 1.5; }
.roadmap-time {
  font-size: 0.65rem; color: var(--purple); margin-top: 3px;
  font-family: 'JetBrains Mono', monospace;
}

/* ═══ History ═══ */
.history-item {
  display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-light);
  align-items: flex-start;
}
.history-item:last-child { border-bottom: none; }
.history-date {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  color: var(--text-light); width: 46px; flex-shrink: 0; padding-top: 1px;
}
.history-content { flex: 1; }
.history-dur { font-size: 0.82rem; color: var(--text); }
.history-tags { font-size: 0.68rem; color: var(--purple); margin-top: 1px; }
.history-note { font-size: 0.72rem; color: var(--text-light); margin-top: 1px; font-style: italic; }

/* ═══ Backup / Restore ═══ */
.backup-section { margin-top: 6px; }
.backup-row {
  display: flex; gap: 8px; margin-bottom: 10px;
}
.backup-btn {
  flex: 1; padding: 10px 8px;
  background: rgba(150,166,200,0.08); border: 1px solid var(--border-light);
  border-radius: 12px; color: var(--text-light); font-size: 0.78rem;
  font-family: 'Noto Sans SC', sans-serif; cursor: pointer; transition: all 0.2s;
  letter-spacing: 1px;
}
.backup-btn:hover { background: rgba(150,166,200,0.15); color: var(--blue-deep); }
.backup-btn.danger { border-color: rgba(200,140,140,0.3); }
.backup-btn.danger:hover { background: rgba(200,140,140,0.08); color: #a07070; }
.backup-code {
  width: 100%; min-height: 80px; max-height: 200px;
  background: rgba(150,166,200,0.05); border: 1px solid var(--border-light);
  border-radius: 12px; padding: 10px 12px; font-size: 0.68rem;
  color: var(--text-light); font-family: 'JetBrains Mono', monospace;
  resize: vertical; outline: none; transition: border 0.3s;
  line-height: 1.5; word-break: break-all;
  display: none;
}
.backup-code.show { display: block; }
.backup-code:focus { border-color: var(--blue); }
.backup-hint {
  font-size: 0.65rem; color: var(--silver); text-align: center;
  margin-top: 6px; line-height: 1.4;
}

/* ═══ Daily Quote ═══ */
.daily-quote {
  text-align: center; padding: 28px 16px 8px;
  font-family: 'Playfair Display', serif; font-style: italic;
  font-size: 0.88rem; color: var(--text-light); line-height: 1.8;
}
.quote-author {
  font-size: 0.7rem; font-style: normal; margin-top: 6px; color: var(--silver);
}

/* ═══ Piano Keys Deco ═══ */
.piano-deco {
  display: flex; justify-content: center; gap: 1.5px;
  margin: 28px auto 0; opacity: 0.15;
}
.p-key {
  width: 14px; height: 40px; border-radius: 0 0 3px 3px;
  background: var(--silver-light); border: 1px solid var(--border-light);
}
.p-key.black {
  width: 9px; height: 24px; background: var(--blue-deep);
  border-radius: 0 0 2px 2px; margin: 0 -5px; z-index: 1; border: none;
}

/* ═══ Toast ═══ */
.toast {
  position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%) translateY(70px);
  background: var(--text-heading); color: rgba(255,255,255,0.92); padding: 11px 26px;
  border-radius: 14px; font-size: 0.82rem; z-index: 100;
  opacity: 0; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); pointer-events: none;
  box-shadow: 0 6px 24px rgba(0,0,0,0.18); letter-spacing: 0.5px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══ Modal ═══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(58,58,80,0.25);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  z-index: 50; display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--bg-card-solid); border-radius: 22px;
  padding: 28px 24px; max-width: 400px; width: 100%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.12);
}
.modal-title {
  font-size: 0.95rem; color: var(--text-heading); margin-bottom: 14px;
  text-align: center; letter-spacing: 1px;
}
.modal-close {
  width: 100%; padding: 11px; margin-top: 12px;
  background: rgba(150,166,200,0.08); border: 1px solid var(--border-light);
  border-radius: 12px; color: var(--text-light); font-size: 0.82rem;
  font-family: 'Noto Sans SC', sans-serif; cursor: pointer;
}

/* ═══ Responsive ═══ */
@media (min-width: 600px) {
  .app { max-width: 560px; padding: 56px 28px 100px; }
  .badges-grid { grid-template-columns: repeat(6, 1fr); }
}
@media (max-width: 359px) {
  .stats-row { gap: 6px; }
  .stat-value { font-size: 1.2rem; }
  .tab-btn { font-size: 0.68rem; padding: 8px 2px; }
}
</style>
</head>
<body>

<div class="cosmos">
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>
  <div class="nebula nebula-4"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Restore Modal -->
<div class="modal-overlay" id="restoreModal">
  <div class="modal-box">
    <div class="modal-title">✦ 读取存档</div>
    <textarea class="backup-code show" id="restoreInput" placeholder="把存档码粘贴到这里…"></textarea>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="backup-btn" id="restoreConfirmBtn" style="flex:1">确认读取</button>
      <button class="backup-btn" id="restoreCancelBtn" style="flex:1">取消</button>
    </div>
    <div class="backup-hint">⚠ 读取后将覆盖当前数据</div>
  </div>
</div>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-deco">
      <span class="line"></span>
      <span>♪ ✦ ♫</span>
      <span class="line"></span>
    </div>
    <h1>Piano Journey</h1>
    <div class="subtitle">钢 琴 打 卡</div>
  </header>

  <!-- Level -->
  <div class="level-banner">
    <div class="level-label">当 前 等 级</div>
    <div class="level-name" id="levelName">Lv.1 启蒙 · Beginner</div>
    <div class="level-sub" id="levelSub">认识键盘与基础乐理</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-info">
      <span id="totalHours">0h / 50h</span>
      <span id="nextLevel">→ Lv.2 入门</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card" data-icon="🔥">
      <div class="stat-value" id="streakVal">0</div>
      <div class="stat-label">连续打卡<span class="stat-unit"> 天</span></div>
    </div>
    <div class="stat-card" data-icon="📅">
      <div class="stat-value" id="weekHours">0</div>
      <div class="stat-label">本周<span class="stat-unit"> 小时</span></div>
    </div>
    <div class="stat-card" data-icon="✦">
      <div class="stat-value" id="monthHours">0</div>
      <div class="stat-label">本月<span class="stat-unit"> 小时</span></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="checkin">打卡</button>
    <button class="tab-btn" data-tab="calendar">日历</button>
    <button class="tab-btn" data-tab="pieces">曲目</button>
    <button class="tab-btn" data-tab="stats">统计</button>
    <button class="tab-btn" data-tab="roadmap">路线</button>
    <button class="tab-btn" data-tab="backup">存档</button>
  </div>

  <!-- Panel: Check-in -->
  <div class="tab-panel active" id="panel-checkin">
    <div class="card">
      <div class="card-title">今日练琴</div>
      <div class="checkin-grid">
        <div class="time-input-group">
          <label>练习时长（分钟）</label>
          <input type="number" class="time-input" id="durationInput" placeholder="30" min="1" max="480">
        </div>
        <div class="time-input-group">
          <label>日期</label>
          <input type="date" class="time-input" id="dateInput">
        </div>
      </div>
      <div class="tags-area">
        <div class="tags-label">练习内容</div>
        <div class="tags-wrap" id="tagsWrap">
          <button class="tag" data-tag="音阶">音阶</button>
          <button class="tag" data-tag="练习曲">练习曲</button>
          <button class="tag" data-tag="曲目">曲目</button>
          <button class="tag" data-tag="乐理">乐理</button>
          <button class="tag" data-tag="视奏">视奏</button>
          <button class="tag" data-tag="即兴">即兴</button>
          <button class="tag" data-tag="节奏">节奏</button>
          <button class="tag" data-tag="听力">听力</button>
        </div>
      </div>
      <textarea class="note-input" id="noteInput" placeholder="今天练琴的心得…"></textarea>
      <button class="checkin-btn" id="checkinBtn">✦ 完成打卡</button>
    </div>
    <div class="card">
      <div class="card-title">最近记录</div>
      <div id="historyList"></div>
    </div>
    <div class="daily-quote" id="dailyQuote"></div>
  </div>

  <!-- Panel: Calendar -->
  <div class="tab-panel" id="panel-calendar">
    <div class="card">
      <div class="card-title">练琴日历</div>
      <div class="cal-nav">
        <button id="calPrev">‹</button>
        <span class="cal-month" id="calMonth"></span>
        <button id="calNext">›</button>
      </div>
      <div class="cal-weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
      <div class="cal-days" id="calDays"></div>
    </div>
  </div>

  <!-- Panel: Pieces -->
  <div class="tab-panel" id="panel-pieces">
    <div class="card">
      <div class="card-title">练习曲目</div>
      <div id="piecesList"></div>
      <div class="add-piece-row">
        <input class="add-piece-input" id="newPieceInput" placeholder="添加新曲目…">
        <button class="add-piece-btn" id="addPieceBtn">添加</button>
      </div>
    </div>
  </div>

  <!-- Panel: Stats -->
  <div class="tab-panel" id="panel-stats">
    <div class="card">
      <div class="card-title">练习内容分布</div>
      <div id="tagChart"></div>
    </div>
    <div class="card">
      <div class="card-title">成就徽章</div>
      <div class="badges-grid" id="badgesGrid"></div>
    </div>
  </div>

  <!-- Panel: Roadmap -->
  <div class="tab-panel" id="panel-roadmap">
    <div class="card">
      <div class="card-title">科学进阶路线</div>
      <div id="roadmapList"></div>
    </div>
  </div>

  <!-- Panel: Backup -->
  <div class="tab-panel" id="panel-backup">
    <div class="card">
      <div class="card-title">数据存档</div>
      <div class="backup-section">
        <div class="backup-row">
          <button class="backup-btn" id="exportBtn">📋 导出存档码</button>
          <button class="backup-btn" id="importBtn">📥 读取存档码</button>
        </div>
        <textarea class="backup-code" id="exportCode" readonly></textarea>
        <div class="backup-row" style="margin-top:10px">
          <button class="backup-btn danger" id="clearBtn">🗑 清空所有数据</button>
        </div>
        <div class="backup-hint">
          导出存档码 → 复制保存到备忘录<br>
          换设备时粘贴存档码即可恢复数据 ✦
        </div>
      </div>
    </div>
  </div>

  <!-- Piano Deco -->
  <div class="piano-deco">
    <div class="p-key"></div><div class="p-key black"></div><div class="p-key"></div><div class="p-key black"></div><div class="p-key"></div>
    <div class="p-key"></div><div class="p-key black"></div><div class="p-key"></div><div class="p-key black"></div><div class="p-key"></div><div class="p-key black"></div><div class="p-key"></div>
    <div class="p-key"></div><div class="p-key black"></div><div class="p-key"></div><div class="p-key black"></div><div class="p-key"></div>
  </div>
</div>

<script>
// ═══ DATA ═══
const SK = 'piano_journey_v2';
const defaults = () => ({ records:[], pieces:[], version:2 });
function load() { try { const d=JSON.parse(localStorage.getItem(SK)); return d&&d.version?d:defaults(); } catch{ return defaults(); } }
function save(d) { localStorage.setItem(SK, JSON.stringify(d)); }
let data = load();

// ═══ LEVELS ═══
const LEVELS = [
  { lv:1, name:'启蒙 · Beginner', sub:'认识键盘与基础乐理', hours:0, desc:'认识88键、五线谱与简谱、基本坐姿手型、C大调音阶、简单双手配合' },
  { lv:2, name:'入门 · Elementary', sub:'基础演奏能力建立', hours:50, desc:'大小调音阶（2-3个调）、基础和弦、拜厄/汤普森、初级视奏' },
  { lv:3, name:'初级 · Late Elementary', sub:'技术扩展与乐感培养', hours:150, desc:'更多调式音阶与琶音、车尔尼599、小奏鸣曲、踏板入门' },
  { lv:4, name:'中初级 · Early Intermediate', sub:'技术与音乐性并进', hours:350, desc:'车尔尼849、巴赫初级曲集、莫扎特小奏鸣曲、装饰音' },
  { lv:5, name:'中级 · Intermediate', sub:'曲目拓展与风格探索', hours:650, desc:'车尔尼299、巴赫二部创意曲、贝多芬/肖邦较易作品' },
  { lv:6, name:'中高级 · Late Intermediate', sub:'高级技术与表现力', hours:1100, desc:'车尔尼740、巴赫三部创意曲、肖邦练习曲入门、完整奏鸣曲' },
  { lv:7, name:'高级 · Advanced', sub:'专业级演奏能力', hours:1800, desc:'肖邦练习曲、李斯特、拉赫玛尼诺夫、巴赫平均律、大型协奏曲' },
  { lv:8, name:'演奏级 · Concert', sub:'舞台演奏与个人诠释', hours:3000, desc:'高难度独奏、音乐会水平、深度诠释、即兴与改编' },
];
const nextHours = [50,150,350,650,1100,1800,3000,5000];

// ═══ BADGES ═══
const BADGES = [
  { icon:'🌱', name:'萌芽', req:'首次打卡', check:(r)=>r.length>=1 },
  { icon:'🔥', name:'初燃', req:'连续7天', check:(_,s)=>s>=7 },
  { icon:'🌙', name:'半月', req:'连续15天', check:(_,s)=>s>=15 },
  { icon:'🌟', name:'恒星', req:'连续30天', check:(_,s)=>s>=30 },
  { icon:'🪐', name:'行星', req:'连续60天', check:(_,s)=>s>=60 },
  { icon:'💫', name:'星云', req:'连续100天', check:(_,s)=>s>=100 },
  { icon:'🎵', name:'旋律', req:'累计50h', check:(r)=>th(r)>=50 },
  { icon:'🎹', name:'琴师', req:'累计200h', check:(r)=>th(r)>=200 },
  { icon:'🏆', name:'大师', req:'累计1000h', check:(r)=>th(r)>=1000 },
  { icon:'🎶', name:'多面手', req:'5种练习', check:(r)=>{ const s=new Set(); r.forEach(x=>x.tags.forEach(t=>s.add(t))); return s.size>=5; } },
  { icon:'📖', name:'笔记达人', req:'20条心得', check:(r)=>r.filter(x=>x.note).length>=20 },
  { icon:'🌌', name:'宇宙', req:'连续365天', check:(_,s)=>s>=365 },
];

// ═══ QUOTES ═══
const QUOTES = [
  ['音乐是灵魂的语言。','贝多芬'],['没有热情，就不可能创造出任何伟大的东西。','舒曼'],
  ['简单是最终的复杂。','达·芬奇'],['练习不是为了完美，而是为了进步。',''],
  ['音乐给予我们无法用语言表达的东西。','门德尔松'],['每天进步一点点，就是最大的成功。',''],
  ['钢琴是一座孤独的岛屿，但岛上有整个宇宙。',''],['不要追求速度，追求掌控。','肖邦'],
  ['耐心是所有天才的共同点。','牛顿'],['音乐可以表达语言无法触及的地方。','德彪西'],
  ['慢练是通往快速的捷径。','钢琴教学格言'],['每一次练习，都是和未来的自己对话。',''],
];

// ═══ UTILS ═══
const th = (r) => r.reduce((s,x)=>s+x.duration,0)/60;
const today = () => new Date().toISOString().slice(0,10);
const fmtD = (s) => s.slice(5).replace('-','/');

function streak(records) {
  if (!records.length) return 0;
  const days = [...new Set(records.map(r=>r.date))].sort().reverse();
  let s=0, cur=new Date(); cur.setHours(0,0,0,0);
  for (const d of days) {
    const dd = new Date(d+'T00:00:00');
    if (Math.round((cur-dd)/864e5) <= 1) { s++; cur=dd; } else break;
  }
  return s;
}
function weekH(r) {
  const n=new Date(), day=n.getDay()||7, m=new Date(n);
  m.setDate(n.getDate()-day+1); m.setHours(0,0,0,0);
  return r.filter(x=>new Date(x.date+'T00:00:00')>=m).reduce((s,x)=>s+x.duration,0)/60;
}
function monthH(r) {
  const ym=today().slice(0,7);
  return r.filter(x=>x.date.startsWith(ym)).reduce((s,x)=>s+x.duration,0)/60;
}
function curLvl(h) { for(let i=LEVELS.length-1;i>=0;i--) if(h>=LEVELS[i].hours) return i; return 0; }

function toast(m) {
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ═══ RENDER ═══
function renderAll() {
  renderLevel(); renderStats(); renderHistory(); renderCalendar();
  renderPieces(); renderChart(); renderBadges(); renderRoadmap(); renderQuote();
}

function renderLevel() {
  const h=th(data.records), li=curLvl(h), lv=LEVELS[li], nh=nextHours[li];
  document.getElementById('levelName').textContent=`Lv.${lv.lv} ${lv.name}`;
  document.getElementById('levelSub').textContent=lv.sub;
  const pct = li<7 ? Math.min(100,((h-lv.hours)/(nh-lv.hours))*100) : 100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('totalHours').textContent = li<7 ? `${Math.round(h)}h / ${nh}h` : `${Math.round(h)}h ✦`;
  document.getElementById('nextLevel').textContent = li<7 ? `→ Lv.${LEVELS[li+1].lv} ${LEVELS[li+1].name.split('·')[0].trim()}` : '已达最高';
}

function renderStats() {
  document.getElementById('streakVal').textContent=streak(data.records);
  document.getElementById('weekHours').textContent=weekH(data.records).toFixed(1);
  document.getElementById('monthHours').textContent=monthH(data.records).toFixed(1);
}

function renderHistory() {
  const el=document.getElementById('historyList');
  const rec=[...data.records].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id).slice(0,8);
  if(!rec.length){el.innerHTML='<div style="text-align:center;color:var(--silver);font-size:0.82rem;padding:14px 0">还没有记录，快来打卡吧 ♪</div>';return;}
  el.innerHTML=rec.map(r=>`<div class="history-item"><div class="history-date">${fmtD(r.date)}</div><div class="history-content"><div class="history-dur">${r.duration} 分钟</div>${r.tags.length?`<div class="history-tags">${r.tags.join(' · ')}</div>`:''}${r.note?`<div class="history-note">${r.note}</div>`:''}</div></div>`).join('');
}

// Calendar
let calY, calM;
{ const n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); }
function renderCalendar() {
  document.getElementById('calMonth').textContent=`${calY}年${calM+1}月`;
  const first=new Date(calY,calM,1); let sd=first.getDay()||7;
  const dim=new Date(calY,calM+1,0).getDate(), td=today();
  const ck=new Set(data.records.map(r=>r.date));
  let h='';
  for(let i=1;i<sd;i++) h+='<div class="cal-day"></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const c=[ds===td?'today':'',ck.has(ds)?'checked':''].filter(Boolean).join(' ');
    h+=`<div class="cal-day ${c}">${d}</div>`;
  }
  document.getElementById('calDays').innerHTML=h;
}
document.getElementById('calPrev').onclick=()=>{calM--;if(calM<0){calM=11;calY--;}renderCalendar();};
document.getElementById('calNext').onclick=()=>{calM++;if(calM>11){calM=0;calY++;}renderCalendar();};

// Pieces
function renderPieces() {
  const el=document.getElementById('piecesList');
  if(!data.pieces.length){el.innerHTML='<div style="text-align:center;color:var(--silver);font-size:0.82rem;padding:14px 0">添加你正在练习的曲目 ♫</div>';return;}
  const lb={learning:'刚开始',practicing:'练习中',mastered:'已掌握'};
  el.innerHTML=data.pieces.map((p,i)=>`<div class="piece-item"><div class="piece-status ${p.status}"></div><div class="piece-name">${p.name}</div><div class="piece-actions"><button class="piece-cycle-btn" onclick="cyclePiece(${i})">${lb[p.status]}</button><button class="piece-del-btn" onclick="delPiece(${i})">✕</button></div></div>`).join('');
}
window.cyclePiece=(i)=>{const o=['learning','practicing','mastered'];data.pieces[i].status=o[(o.indexOf(data.pieces[i].status)+1)%3];save(data);renderPieces();};
window.delPiece=(i)=>{data.pieces.splice(i,1);save(data);renderPieces();};
document.getElementById('addPieceBtn').onclick=()=>{const inp=document.getElementById('newPieceInput'),n=inp.value.trim();if(!n)return;data.pieces.push({name:n,status:'learning'});save(data);inp.value='';renderPieces();};
document.getElementById('newPieceInput').onkeydown=(e)=>{if(e.key==='Enter')document.getElementById('addPieceBtn').click();};

// Chart
function renderChart() {
  const counts={};
  data.records.forEach(r=>r.tags.forEach(t=>{counts[t]=(counts[t]||0)+r.duration;}));
  const el=document.getElementById('tagChart');
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if(!entries.length){el.innerHTML='<div style="text-align:center;color:var(--silver);font-size:0.82rem;padding:14px 0">打卡后这里会出现统计 ✦</div>';return;}
  const mx=entries[0][1];
  el.innerHTML=entries.map(([t,m],i)=>`<div class="chart-bar-row"><div class="chart-label">${t}</div><div class="chart-track"><div class="chart-fill c${i%5}" style="width:${Math.max(12,m/mx*100)}%">${m>=60?(m/60).toFixed(1)+'h':m+'m'}</div></div></div>`).join('');
}

// Badges
function renderBadges() {
  const s=streak(data.records);
  document.getElementById('badgesGrid').innerHTML=BADGES.map(b=>{
    const ok=b.check(data.records,s);
    return `<div class="badge ${ok?'unlocked':'locked'}"><div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div><div class="badge-req">${b.req}</div></div>`;
  }).join('');
}

// Roadmap
function renderRoadmap() {
  const h=th(data.records), ci=curLvl(h);
  document.getElementById('roadmapList').innerHTML=LEVELS.map((lv,i)=>{
    const cls=i<ci?'passed':i===ci?'current':'';
    return `<div class="roadmap-item ${cls}"><div class="roadmap-level">Lv.${lv.lv}</div><div class="roadmap-info"><div class="roadmap-name">${lv.name}</div><div class="roadmap-desc">${lv.desc}</div><div class="roadmap-time">${lv.hours>0?'累计 '+lv.hours+'h':'起点'} → ${nextHours[i]}h</div></div></div>`;
  }).join('');
}

// Quote
function renderQuote() {
  const d=Math.floor(Date.now()/864e5), q=QUOTES[d%QUOTES.length];
  document.getElementById('dailyQuote').innerHTML=`"${q[0]}"<div class="quote-author">${q[1]?'—— '+q[1]:''}</div>`;
}

// ═══ CHECK-IN ═══
document.getElementById('dateInput').value=today();
const selTags=new Set();
document.getElementById('tagsWrap').onclick=(e)=>{
  if(!e.target.classList.contains('tag'))return;
  const t=e.target.dataset.tag;
  if(selTags.has(t)){selTags.delete(t);e.target.classList.remove('active');}
  else{selTags.add(t);e.target.classList.add('active');}
};
document.getElementById('checkinBtn').onclick=()=>{
  const dur=parseInt(document.getElementById('durationInput').value);
  const date=document.getElementById('dateInput').value;
  if(!dur||dur<=0){toast('请输入练习时长 ♪');return;}
  if(!date){toast('请选择日期 ♪');return;}
  data.records.push({id:Date.now(),date,duration:dur,tags:[...selTags],note:document.getElementById('noteInput').value.trim()});
  save(data);
  document.getElementById('durationInput').value='';
  document.getElementById('noteInput').value='';
  selTags.clear();
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('active'));
  toast('打卡成功 ✦ 今天也很棒！');
  renderAll();
};

// ═══ TABS ═══
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  };
});

// ═══ BACKUP / RESTORE ═══
document.getElementById('exportBtn').onclick=()=>{
  const code=document.getElementById('exportCode');
  const raw=JSON.stringify(data);
  // base64 encode for cleaner copy-paste
  const b64=btoa(unescape(encodeURIComponent(raw)));
  code.value='PJ✦'+b64;
  code.classList.add('show');
  code.select(); code.setSelectionRange(0,99999);
  if(navigator.clipboard){navigator.clipboard.writeText(code.value).then(()=>toast('存档码已复制 ✦')).catch(()=>toast('请手动全选复制'));}
  else toast('请手动全选复制');
};

document.getElementById('importBtn').onclick=()=>{
  document.getElementById('restoreInput').value='';
  document.getElementById('restoreModal').classList.add('show');
};
document.getElementById('restoreCancelBtn').onclick=()=>{
  document.getElementById('restoreModal').classList.remove('show');
};
document.getElementById('restoreConfirmBtn').onclick=()=>{
  const raw=document.getElementById('restoreInput').value.trim();
  if(!raw){toast('请粘贴存档码');return;}
  try {
    let json;
    if(raw.startsWith('PJ✦')){
      json=decodeURIComponent(escape(atob(raw.slice(3))));
    } else {
      json=raw;
    }
    const d=JSON.parse(json);
    if(!d.records){toast('存档格式错误');return;}
    data=d; save(data); renderAll();
    document.getElementById('restoreModal').classList.remove('show');
    toast('读档成功 ✦ 数据已恢复！');
  } catch(e) { toast('存档码无效，请检查'); }
};

document.getElementById('clearBtn').onclick=()=>{
  if(confirm('确定要清空所有数据吗？建议先导出存档码！')){
    data=defaults(); save(data); renderAll(); toast('数据已清空');
  }
};

// ═══ DECORATIONS ═══
(function(){
  const c=document.querySelector('.cosmos');
  for(let i=0;i<35;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+0.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2.5+Math.random()*4}s`;
    c.appendChild(s);
  }
  const notes=['♪','♫','♩','♬','✦','✧','⋆'];
  for(let i=0;i<7;i++){
    const el=document.createElement('div'); el.className='float-note';
    el.textContent=notes[i%notes.length];
    el.style.cssText=`left:${6+Math.random()*88}%;animation-delay:${Math.random()*25}s;font-size:${1+Math.random()*1.2}rem`;
    document.body.appendChild(el);
  }
})();

// ═══ INIT ═══
renderAll();

// ═══ SERVICE WORKER ═══
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./piano-sw.js').catch(() => {});
}
</script>
