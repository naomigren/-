<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="克拉拉养成">
<title>克拉拉养成计划</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Caveat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:linear-gradient(160deg,#fdf2f0 0%,#f5e6e0 40%,#f0e0da 100%);color:#5a4a4a;font-family:'Noto Sans SC','Segoe UI',sans-serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;border:none;background:none;font-family:inherit;-webkit-tap-highlight-color:transparent;}
textarea,input{font-family:inherit;-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(219,147,158,0.3);border-radius:4px;}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes sparkle{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(219,147,158,0.3);}50%{box-shadow:0 0 40px rgba(219,147,158,0.5);}}
.bg1{position:fixed;top:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(219,147,158,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.bg2{position:fixed;bottom:-10%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(199,163,163,0.06) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:14px 24px;border-radius:14px;z-index:1000;font-size:15px;font-weight:600;max-width:90vw;text-align:center;color:white;box-shadow:0 8px 32px rgba(255,255,255,0.7);animation:slideDown 0.3s ease-out;}
.toast-earn{background:linear-gradient(135deg,#7ba889,#6b9a7a);}.toast-big{background:linear-gradient(135deg,#c4868e,#d4a0a0);}.toast-redeem{background:linear-gradient(135deg,#c9a878,#d4b888);}.toast-penalty{background:linear-gradient(135deg,#c07070,#d48888);}.toast-fail{background:linear-gradient(135deg,#374151,#4b5563);}.toast-card{background:linear-gradient(135deg,#8a7a9a,#a08aaa);}
.inp{width:100%;padding:8px 12px;border-radius:8px;font-size:14px;background:rgba(255,255,255,0.6);color:#5a4a4a;border:1px solid rgba(219,147,158,0.2);outline:none;box-sizing:border-box;}
.tab-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;transition:all 0.2s ease;}
.tab-active{font-weight:600;color:#fff;background:linear-gradient(135deg,rgba(219,147,158,0.3),rgba(199,163,163,0.2));}
.tab-inactive{font-weight:400;color:#a08888;background:transparent;}
.task-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 14px;border-radius:10px;color:#5a4a4a;border:1px solid rgba(219,147,158,0.2);background:rgba(255,255,255,0.5);}
.task-btn-big{background:linear-gradient(135deg,rgba(219,147,158,0.12),rgba(199,163,163,0.08));border:1px solid rgba(219,147,158,0.25);}
.pen-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 14px;background:rgba(210,140,140,0.06);border-radius:10px;border:1px solid rgba(210,140,140,0.15);color:#c08888;}
.pts{font-size:13px;font-weight:700;font-family:'Outfit';white-space:nowrap;margin-left:8px;}
.section-title{font-size:15px;font-weight:600;margin-bottom:10px;}
.hidden{display:none;}
@keyframes achieveSlideIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}60%{transform:translate(-50%,-50%) scale(1.05);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
@keyframes achieveGlow{0%,100%{box-shadow:0 0 30px rgba(196,134,142,0.4);}50%{box-shadow:0 0 60px rgba(196,134,142,0.7);}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
@keyframes epicFlash{0%{opacity:0;}15%{opacity:0.3;}30%{opacity:0;}100%{opacity:0;}}
@keyframes shakeIt{0%,100%{transform:translateX(0);}25%,75%{transform:translateX(-3px);}50%{transform:translateX(3px);}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 8px rgba(163,176,196,0.3);}50%{box-shadow:0 0 16px rgba(163,176,196,0.5);}}
.achieve-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2000;display:flex;align-items:center;justify-content:center;}
.achieve-overlay-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);}
.achieve-card{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2001;width:85vw;max-width:340px;border-radius:20px;padding:28px 24px;text-align:center;}
.achieve-card-normal{background:linear-gradient(145deg,#e8edf3,#d5dce6);border:2px solid #a3b0c4;box-shadow:0 8px 32px rgba(163,176,196,0.4);}
.achieve-card-rare{background:linear-gradient(145deg,#e8e8ef,#d8d8e2);border:2px solid #a8a8b8;box-shadow:0 8px 32px rgba(168,168,184,0.4);animation:pulseGlow 2s ease-in-out infinite;}
.achieve-card-epic{background:linear-gradient(145deg,#faf5eb,#f0e8d8);border:2px solid #d4a840;box-shadow:0 8px 32px rgba(212,168,64,0.4);animation:achieveGlow 2s ease-in-out infinite;}
.achieve-card-legend{background:linear-gradient(145deg,#f5ede8,#efe4de);border:2px solid transparent;box-shadow:0 12px 48px rgba(196,134,142,0.5);animation:achieveSlideIn 0.5s ease-out;}
.confetti-piece{position:fixed;top:-10px;z-index:2002;pointer-events:none;animation:confettiFall linear forwards;}
.epic-flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1999;pointer-events:none;animation:epicFlash 0.6s ease-out forwards;}
@keyframes legendLockedPulse{0%,100%{border-color:rgba(196,134,142,0.2);box-shadow:0 0 12px rgba(196,134,142,0.08);}50%{border-color:rgba(196,134,142,0.45);box-shadow:0 0 20px rgba(196,134,142,0.15);}}
@keyframes epicLockedShimmer{0%,100%{border-color:rgba(212,168,64,0.15);box-shadow:0 0 8px rgba(212,168,64,0.05);}50%{border-color:rgba(212,168,64,0.35);box-shadow:0 0 14px rgba(212,168,64,0.1);}}
@keyframes rareLockedGlow{0%,100%{border-color:rgba(168,168,184,0.15);}50%{border-color:rgba(168,168,184,0.3);}}
.ach-wall-card{padding:14px 16px;border-radius:14px;margin-bottom:10px;position:relative;overflow:hidden;}
.ach-locked-normal{background:linear-gradient(135deg,rgba(163,176,196,0.06),rgba(163,176,196,0.02));border:1px dashed rgba(163,176,196,0.25);}
.ach-locked-rare{background:linear-gradient(135deg,rgba(168,168,184,0.08),rgba(168,168,184,0.03));border:1px dashed rgba(168,168,184,0.25);animation:rareLockedGlow 3s ease-in-out infinite;}
.ach-locked-epic{background:linear-gradient(135deg,rgba(212,168,64,0.06),rgba(212,168,64,0.02));border:1px dashed rgba(212,168,64,0.2);animation:epicLockedShimmer 3s ease-in-out infinite;}
.ach-locked-legend{background:linear-gradient(135deg,rgba(196,134,142,0.08),rgba(199,163,163,0.04));border:1.5px dashed rgba(196,134,142,0.25);animation:legendLockedPulse 3s ease-in-out infinite;}
.ach-unlocked-normal{background:linear-gradient(135deg,rgba(163,176,196,0.12),rgba(163,176,196,0.06));border:1px solid rgba(163,176,196,0.3);}
.ach-unlocked-rare{background:linear-gradient(135deg,rgba(168,168,184,0.12),rgba(168,168,184,0.06));border:1px solid rgba(168,168,184,0.3);}
.ach-unlocked-epic{background:linear-gradient(135deg,rgba(212,168,64,0.1),rgba(212,168,64,0.04));border:1px solid rgba(212,168,64,0.3);}
.ach-unlocked-legend{background:linear-gradient(135deg,rgba(196,134,142,0.12),rgba(199,163,163,0.06));border:1px solid rgba(196,134,142,0.3);animation:glow 3s ease-in-out infinite;}

/* CARD FRAGMENT SYSTEM */
.card-carousel-wrap{position:relative;margin:0 0 20px;overflow:hidden;}
.card-carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:14px;padding:0 8px;}
.card-carousel::-webkit-scrollbar{display:none;}
.card-slot{flex:0 0 82vw;max-width:360px;scroll-snap-align:center;border-radius:16px;overflow:hidden;position:relative;background:#3a3035;box-shadow:0 6px 24px rgba(80,60,68,0.22);}
@keyframes cardGlow{0%,100%{box-shadow:0 6px 24px rgba(212,180,140,0.25);}50%{box-shadow:0 8px 32px rgba(212,180,140,0.45);}}
.card-slot-done{border:2px solid rgba(212,180,140,0.5);animation:cardGlow 3s ease-in-out infinite;}
.card-img-wrap{position:relative;width:100%;padding-top:133%;overflow:hidden;}
.card-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
.card-mask{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.card-piece{position:absolute;background:rgba(55,45,50,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:opacity 0.8s ease;border:0.5px solid rgba(100,85,90,0.18);}
.card-piece.unlocked{opacity:0;backdrop-filter:none;-webkit-backdrop-filter:none;}
.card-info{padding:10px 14px;text-align:center;background:rgba(50,40,45,0.55);}
.card-info-name{font-size:14px;font-weight:600;color:rgba(230,215,210,0.88);letter-spacing:1px;margin-bottom:2px;}
.card-info-line{font-size:11px;color:rgba(199,170,165,0.6);margin-bottom:4px;}
.card-info-prog{font-family:'Outfit';font-size:13px;font-weight:700;color:rgba(219,180,175,0.85);}
.card-dots{display:flex;justify-content:center;gap:6px;padding:8px 0 2px;}
.card-dot{width:7px;height:7px;border-radius:50%;background:rgba(219,147,158,0.2);transition:all 0.3s;}
.card-dot.active{background:rgba(219,147,158,0.55);transform:scale(1.25);}
.card-lock{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;opacity:0.35;z-index:5;transition:opacity 0.5s;pointer-events:none;}
.card-lock.hide{opacity:0;}
.card-reveal-ov{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background 0.5s;pointer-events:none;opacity:0;}
.card-reveal-ov.on{background:rgba(20,15,18,0.88);pointer-events:all;opacity:1;}
.card-reveal-box{position:relative;width:78vw;max-width:340px;border-radius:16px;overflow:hidden;box-shadow:0 12px 60px rgba(196,134,142,0.35);transform:scale(0.8);transition:transform 0.8s cubic-bezier(0.16,1,0.3,1);opacity:0;}
.card-reveal-ov.on .card-reveal-box{transform:scale(1);opacity:1;}
.card-reveal-img{width:100%;display:block;filter:blur(20px);transition:filter 2s ease;}
.card-reveal-img.clear{filter:blur(0);}
.card-reveal-cap{position:absolute;bottom:0;left:0;right:0;padding:20px;text-align:center;background:linear-gradient(transparent,rgba(20,15,18,0.8));opacity:0;transition:opacity 1s ease 1.5s;}
.card-reveal-ov.on .card-reveal-cap{opacity:1;}

/* DAILY PLAN */
@keyframes dpBounceIn{0%{opacity:0;transform:translateY(-15px) scale(0.9);}50%{transform:translateY(4px) scale(1.02);}100%{opacity:1;transform:translateY(0) scale(1);}}
@keyframes dpStarBurst{0%{opacity:1;transform:scale(0.5);}60%{opacity:1;transform:scale(1.3);}100%{opacity:0;transform:scale(1.8);}}
@keyframes dpCheckPop{0%{transform:scale(1);}30%{transform:scale(0.92);}60%{transform:scale(1.06);}100%{transform:scale(1);}}
@keyframes dpSparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg);}50%{opacity:1;transform:scale(1) rotate(180deg);}}
@keyframes dpFloat{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-30px);}}
.dp-wrap{margin-bottom:20px;}
.dp-msg{padding:14px 16px;border-radius:14px;background:linear-gradient(135deg,rgba(219,147,158,0.1),rgba(199,163,163,0.06));border:1px solid rgba(219,147,158,0.2);margin-bottom:16px;font-size:13px;line-height:1.7;color:#6a5555;min-height:50px;position:relative;overflow:hidden;}
.dp-msg-loading{color:#b09898;font-style:italic;}
.dp-msg-quote{font-style:italic;color:#8a6a6e;}
.dp-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.55);border:1px solid rgba(219,147,158,0.15);margin-bottom:8px;position:relative;overflow:hidden;animation:dpBounceIn 0.4s ease-out;}
.dp-item.done{background:rgba(219,147,158,0.08);border-color:rgba(219,147,158,0.25);}
.dp-item.done .dp-item-name{text-decoration:line-through;color:#b09898;}
.dp-check{width:26px;height:26px;border-radius:50%;border:2px solid rgba(219,147,158,0.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s;font-size:13px;cursor:pointer;}
.dp-check.checked{background:linear-gradient(135deg,#c4868e,#d4a0a0);border-color:#c4868e;color:#fff;animation:dpCheckPop 0.4s ease;}
.dp-item-name{flex:1;font-size:14px;color:#5a4a4a;}
.dp-time{font-size:11px;color:#b09898;font-family:'Outfit';white-space:nowrap;}
.dp-time-input{width:48px;padding:3px 4px;border-radius:6px;font-size:11px;text-align:center;background:rgba(255,255,255,0.7);border:1px solid rgba(219,147,158,0.2);color:#6a5555;font-family:'Outfit';outline:none;}
.dp-rm{padding:2px 8px;border-radius:6px;font-size:11px;color:#c07070;background:rgba(210,140,140,0.1);cursor:pointer;flex-shrink:0;}
.dp-stars{position:absolute;top:50%;left:50%;pointer-events:none;}
.dp-star{position:absolute;width:8px;height:8px;background:#c4868e;border-radius:50%;animation:dpStarBurst 0.6s ease-out forwards;}
.dp-float-pts{position:absolute;right:14px;top:-5px;font-family:'Outfit';font-weight:700;font-size:14px;color:#c4868e;pointer-events:none;animation:dpFloat 1s ease-out forwards;}
.dp-add-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;color:#c4868e;background:rgba(219,147,158,0.1);border:1px solid rgba(219,147,158,0.2);cursor:pointer;transition:all 0.2s;}
.dp-add-btn:active{transform:scale(0.95);background:rgba(219,147,158,0.2);}
.dp-done-card{padding:20px;border-radius:16px;text-align:center;background:linear-gradient(145deg,rgba(219,147,158,0.12),rgba(199,163,163,0.06));border:1px solid rgba(219,147,158,0.25);margin-top:16px;animation:dpBounceIn 0.5s ease-out;}

/* PALACE TAB */
.hide-scrollbar::-webkit-scrollbar{display:none;}
.pl-flower-wrap{position:relative;width:100%;height:180px;border-radius:16px;margin-bottom:16px;overflow:hidden;}
.pl-flower-wrap canvas{width:100%;height:100%;display:block;}
.pl-header{text-align:center;padding:18px 16px 14px;background:rgba(253,250,249,0.85);backdrop-filter:blur(8px);border-radius:16px;box-shadow:0 2px 12px rgba(138,90,96,0.06);margin-bottom:16px;position:relative;overflow:hidden;}
.pl-header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ecd4d6,#c48e93,#ecd4d6);}
.pl-header h2{font-family:'Playfair Display',serif;font-weight:400;font-size:1.25rem;color:#8a5a60;letter-spacing:2px;margin-bottom:2px;}
.pl-sub{font-family:'Caveat',cursive;font-size:0.85rem;color:#b08a8e;letter-spacing:1px;}
.pl-goal{font-size:0.72rem;color:#d6a6aa;margin-top:4px;}
.pl-stats{display:flex;justify-content:center;gap:20px;margin-top:10px;font-size:0.75rem;color:#b08a8e;}
.pl-stats b{color:#8a5a60;font-size:0.95rem;font-family:'Playfair Display',serif;}
.pl-chart-wrap{margin-top:12px;height:160px;position:relative;background:#f9f0f1;border-radius:10px;padding:8px;}
.pl-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin:0 auto 16px;}
.pl-day{aspect-ratio:1;background:#fdfaf9;border:1.5px solid #ecd4d6;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:0.75rem;color:#b08a8e;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
.pl-day:hover{transform:translateY(-2px);box-shadow:0 3px 10px rgba(138,90,96,0.1);}
.pl-day.active{background:linear-gradient(135deg,#c48e93,#d6a6aa);color:white;border-color:#c48e93;box-shadow:0 2px 8px rgba(196,142,147,0.3);}
.pl-day.active::after{content:'\\2713';position:absolute;font-size:0.45rem;top:1px;right:2px;opacity:0.7;}
.pl-day.has-meals::before{content:'\\1F37D';position:absolute;bottom:1px;right:1px;font-size:0.35rem;}
.pl-day.milestone{border-color:#c8b070;border-width:2px;}
.pl-day.milestone.active{background:linear-gradient(135deg,#c8b070,#d4c490);border-color:#c8b070;}
.pl-day.reward-cell{border-style:dashed;border-color:#e0bfc2;}
.pl-card{background:#fdfaf9;border-radius:16px;box-shadow:0 2px 12px rgba(138,90,96,0.06);padding:18px;margin-bottom:16px;position:relative;overflow:hidden;}
.pl-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ecd4d6,#d6a6aa,#ecd4d6);}
.pl-card h3{font-family:'Playfair Display',serif;font-weight:400;font-size:0.95rem;color:#8a5a60;margin-bottom:10px;letter-spacing:1px;}
.pl-reward-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:0.8rem;}
.pl-reward-label{font-family:'Caveat',cursive;font-size:0.9rem;color:#c8b070;min-width:38px;}
.pl-reward-input{flex:1;padding:6px 10px;border:1px solid #ecd4d6;border-radius:8px;font-size:0.78rem;color:#5a3a40;background:#f9f0f1;outline:none;}
.pl-reward-input:focus{border-color:#c48e93;}
.pl-whisper-btn{width:100%;margin-top:10px;background:#e0bfc2;color:#5a3a40;border:none;padding:10px;border-radius:10px;cursor:pointer;font-size:0.78rem;}
.pl-vision-item{background:#f9f0f1;border-radius:12px;padding:12px 14px;margin-bottom:10px;position:relative;}
.pl-vision-item p{font-size:0.82rem;color:#5a3a40;line-height:1.6;}
.pl-vision-item img{width:100%;border-radius:10px;margin-top:6px;max-height:200px;object-fit:cover;}
.pl-vision-item .del-v{position:absolute;top:6px;right:8px;background:none;border:none;color:#e0bfc2;font-size:0.9rem;cursor:pointer;}
.pl-vision-add textarea{width:100%;padding:8px;border:1px solid #ecd4d6;border-radius:8px;font-size:0.78rem;color:#5a3a40;resize:none;height:40px;outline:none;margin-bottom:8px;}
.pl-img-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.pl-img-row label{font-size:0.75rem;color:#c48e93;cursor:pointer;border:1px dashed #d6a6aa;padding:4px 12px;border-radius:8px;}
.pl-img-row span{font-size:0.68rem;color:#b08a8e;}
.pl-img-row input[type="file"]{display:none;}
.pl-btn-vision{background:#d6a6aa;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.75rem;}
.pl-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(90,58,64,0.2);backdrop-filter:blur(4px);z-index:90;}
.pl-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fdfaf9;padding:22px 20px;border-radius:16px;width:90%;max-width:400px;z-index:100;box-shadow:0 8px 40px rgba(90,58,64,0.15);max-height:85vh;overflow-y:auto;}
.pl-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#d6a6aa,#8a5a60,#d6a6aa);border-radius:16px 16px 0 0;}
.pl-panel-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:1.1rem;color:#e0bfc2;cursor:pointer;}
.pl-panel h3{font-family:'Playfair Display',serif;font-weight:400;font-size:1rem;color:#8a5a60;margin-bottom:14px;text-align:center;}
.pl-panel label{display:block;font-family:'Caveat',cursive;font-size:0.88rem;color:#b08a8e;margin:10px 0 4px;}
.pl-panel input[type="number"]{width:100%;padding:7px 10px;border:1px solid #ecd4d6;border-radius:8px;font-size:0.82rem;color:#5a3a40;background:#f9f0f1;outline:none;}
.pl-mood-row{display:flex;gap:8px;margin:6px 0 10px;font-size:1.3rem;}
.pl-mood-btn{cursor:pointer;transition:transform 0.15s;padding:2px;}

let _cardFragQ=[];
function checkCardFragments(){
  const conds=getFragConds();
  let changed=false;
  CARD_DEFS.forEach(cd=>{
    const arr=S.cards[cd.id];
    const c=conds[cd.id];
    c.forEach((met,i)=>{
      if(met && !arr[i]){
        arr[i]=true; changed=true;
        const done=arr.filter(Boolean).length;
        if(done===cd.total){
          _cardFragQ.push({type:'full',card:cd});
        } else {
          _cardFragQ.push({type:'frag',card:cd,idx:done,total:cd.total});
        }
      }
    });
  });
  if(changed){saveState();if(currentTab==='achieve')renderAchieve();}
  if(_cardFragQ.length){processCardQ();}
}
function processCardQ(){
  if(!_cardFragQ.length)return;
  const ev=_cardFragQ.shift();
  if(ev.type==='frag'){
    flash('✨ 「'+ev.card.name+'」碎片 '+ev.idx+'/'+ev.total+' 已揭示','card');
    setTimeout(processCardQ,1200);
  } else {
    showCardReveal(ev.card);
  }
}

function addCT(){const n=document.getElementById("ct_name").value.trim();if(!n){flash("任务名不能为空！","fail");return;}const pts=Math.max(1,Math.min(500,parseInt(document.getElementById("ct_pts").value)||5));const em=document.getElementById("ct_em").value||"⭐";const pr=document.getElementById("ct_pr").value.trim()||`完成了${n}，好棒！`;S.ct.push({id:"c_"+Date.now(),name:n,pts,em,praise:pr,attrMap:{mood:1}});saveState();render();flash(`✨ 新任务已添加：${n}`,"earn");}
function rmCT(id){S.ct=S.ct.filter(t=>t.id!==id);saveState();render();flash("任务已删除","penalty");}
function addCS(){const n=document.getElementById("cs_name").value.trim();if(!n){flash("奖励名不能为空！","fail");return;}const cost=Math.max(1,parseInt(document.getElementById("cs_cost").value)||50);const em=document.getElementById("cs_em").value||"🎁";S.cs.push({id:"cs_"+Date.now(),name:n,cost,em});saveState();render();flash(`✨ 新奖励已上架：${n}`,"earn");}
function rmCS(id){S.cs=S.cs.filter(i=>i.id!==id);saveState();render();flash("奖励已下架","penalty");}
function addCP(){const n=document.getElementById("cp_name").value.trim();if(!n){flash("名称不能为空！","fail");return;}const pts=-Math.abs(parseInt(document.getElementById("cp_pts").value)||10);const em=document.getElementById("cp_em").value||"😬";S.cpn.push({id:"cp_"+Date.now(),name:n,pts,em,attrMap:{mood:-1}});saveState();render();flash(`⚠️ 新扣分项已添加：${n}`,"penalty");}
function rmCP(id){S.cpn=S.cpn.filter(p=>p.id!==id);saveState();render();flash("扣分项已删除","earn");}
function toggleSave(){const p=document.getElementById("savePanel");p.classList.toggle("hidden");document.getElementById("loadPanel").classList.add("hidden");if(!p.classList.contains("hidden"))document.getElementById("saveCode").value=encode(S);}
function toggleLoad(){document.getElementById("loadPanel").classList.toggle("hidden");document.getElementById("savePanel").classList.add("hidden");document.getElementById("loadMsg").textContent="";}
function copyCode(){const c=document.getElementById("saveCode").value;navigator.clipboard?navigator.clipboard.writeText(c).then(()=>flash("存档码已复制！","earn")):flash("请长按手动复制","fail");}
function loadSave(){const d=decode(document.getElementById("loadCode").value);if(d&&typeof d.cp==="number"){S={...d,ct:d.ct||[],cs:d.cs||[],cpn:d.cpn||[],attrs:d.attrs?{...initAttrs(),...d.attrs}:initAttrs(),de:d.de||0,ach:d.ach||{},taskCounts:d.taskCounts||{},dailyTasks:d.dailyTasks||{},dailyPens:d.dailyPens||{},dailyPts:d.dailyPts||{},cards:d.cards||initCards(),dailyPlan:d.dailyPlan||{date:"",items:[]},wishes:d.wishes||{}};saveState();render();document.getElementById("loadPanel").classList.add("hidden");flash("存档读取成功！","big");}else{document.getElementById("loadMsg").innerHTML='<span style="color:#c07070">❌ 存档码无效</span>';}}

function renderAttrs(){
  const cx=160,cy=160,maxR=130,levels=6,n=ATTRS.length,step=(2*Math.PI)/n;

  let svg=`<div style="display:flex;justify-content:center;margin-bottom:20px;"><svg width="320" height="320" viewBox="0 0 320 320">`;
  for(let l=1;l<=levels;l++){const r=(maxR/levels)*l;let pts="";ATTRS.forEach((_,i)=>{const p=gp(i,r);pts+=p[0]+","+p[1]+" ";});svg+=`<polygon points="${pts}" fill="none" stroke="rgba(219,147,158,0.2)" stroke-width="1"/>`;}
  ATTRS.forEach((_,i)=>{const p=gp(i,maxR);svg+=`<line x1="${cx}" y1="${cy}" x2="${p[0]}" y2="${p[1]}" stroke="rgba(219,147,158,0.15)" stroke-width="1"/>`;});
  let dataPts="";ATTRS.forEach((attr,i)=>{const xp=S.attrs[attr.id]||0;const lv=getLv(xp);const r=Math.max(8,(lv/levels)*maxR);const p=gp(i,r);dataPts+=p[0]+","+p[1]+" ";});
  svg+=`<polygon points="${dataPts}" fill="rgba(196,134,142,0.25)" stroke="#c4868e" stroke-width="2"/>`;
  ATTRS.forEach((attr,i)=>{const xp=S.attrs[attr.id]||0;const lv=getLv(xp);const r=Math.max(8,(lv/levels)*maxR);const p=gp(i,r);svg+=`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#c4868e"/>`;});
  ATTRS.forEach((attr,i)=>{const p=gp(i,maxR+18);svg+=`<text x="${p[0]}" y="${p[1]}" text-anchor="middle" dominant-baseline="middle" fill="#8a6a6e" font-size="9" font-family="'Noto Sans SC'">${attr.em}${attr.name}</text>`;});
  svg+=`</svg></div>`;

/* ═══════ ACHIEVEMENT HELPERS ═══════ */
function todayStr(){var d=new Date();if(d.getHours()>=23){d.setDate(d.getDate()+1);}return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function yesterdayStr(){var d=new Date();if(d.getHours()<23){d.setDate(d.getDate()-1);}return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysBetween(a,b){return Math.floor((new Date(b)-new Date(a))/86400000);}
function tList(){return S.dailyTasks[todayStr()]||[];}
function hasPenToday(id){return(S.dailyPens[todayStr()]||[]).includes(id);}
function cnt(id){return S.taskCounts[id]||0;}
function cntFear(){return["contact_teacher","deal_academic","check_grad","submit_overdue","face_fear"].reduce((s,id)=>s+cnt(id),0);}
function taskStrk(id){let c=0,d=new Date();for(let i=0;i<200;i++){if((S.dailyTasks[d.toISOString().slice(0,10)]||[]).includes(id))c++;else break;d.setDate(d.getDate()-1);}return c;}
function multiStrk(ids,max){let c=0,d=new Date();for(let i=0;i<max+5;i++){const t=S.dailyTasks[d.toISOString().slice(0,10)]||[];if(ids.every(id=>t.includes(id)))c++;else break;d.setDate(d.getDate()-1);}return c;}
function grpStrk(ids,max){let c=0,d=new Date();for(let i=0;i<max+5;i++){const t=S.dailyTasks[d.toISOString().slice(0,10)]||[];if(ids.some(id=>t.includes(id)))c++;else break;d.setDate(d.getDate()-1);}return c;}

function spawnConfetti(n,cols){const c=document.getElementById("confettiContainer");for(let i=0;i<n;i++){const p=document.createElement("div");p.className="confetti-piece";const sz=Math.random()*8+4;p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>0.5?"50%":"2px"};animation-duration:${Math.random()*2+2}s;animation-delay:${Math.random()*0.5}s`;c.appendChild(p);setTimeout(()=>p.remove(),4500);}}
function showAchPopup(a){
  const r=ACH_R[a.r];const o=document.getElementById("achieveOverlay");
  if(a.r==="normal"){spawnConfetti(30,["#a3b0c4","#c4d0e0","#8a9bb5"]);document.body.style.animation="shakeIt 0.3s ease";setTimeout(()=>document.body.style.animation="",400);}
  else if(a.r==="rare"){spawnConfetti(60,["#a8a8b8","#c8c8d8","#d8d8e8"]);spawnConfetti(30,["#a8a8b8","#c8c8d8","#d8d8e8"]);}
  else if(a.r==="epic"){spawnConfetti(120,["#d4a840","#e8c860","#c49830","#f0d878"]);const f=document.createElement("div");f.className="epic-flash";f.style.background="#d4a840";document.body.appendChild(f);setTimeout(()=>f.remove(),700);setTimeout(()=>spawnConfetti(60,["#d4a840","#f0d878"]),500);}
  else{spawnConfetti(180,["#c4868e","#d4a0a0","#c9b8a8","#a3b0c4","#d4a840"]);const f=document.createElement("div");f.className="epic-flash";f.style.background="linear-gradient(135deg,#c4868e,#d4a0a0)";document.body.appendChild(f);setTimeout(()=>f.remove(),700);setTimeout(()=>spawnConfetti(80,["#c4868e","#d4a0a0","#e8b4b8"]),600);setTimeout(()=>spawnConfetti(50,["#c4868e","#c9b8a8"]),1200);}
  const pc=a.r==="legend"?"#c4868e":a.r==="epic"?"#d4a840":a.r==="rare"?"#a8a8b8":"#a3b0c4";
  o.innerHTML=`<div class="achieve-overlay"><div class="achieve-overlay-bg"></div><div id="achCardInner" class="achieve-card ${r.cc}" style="opacity:0;transform:translate(-50%,-50%) scale(0.5);" onclick="event.stopPropagation()"><div style="font-size:20px;letter-spacing:4px;margin-bottom:8px;">${r.stars}</div><div style="font-size:11px;letter-spacing:2px;color:${r.color};margin-bottom:8px;">${r.label}成就</div><div style="font-family:'Outfit';font-size:20px;font-weight:700;color:#5a4a4a;margin-bottom:12px;">「${a.name}」</div><div style="font-size:14px;line-height:1.7;color:#6a5a5a;margin-bottom:16px;">${a.msg}</div><div style="font-family:'Outfit';font-size:24px;font-weight:800;color:${pc};margin-bottom:16px;">+${a.pts}</div><button onclick="closeAch()" style="padding:10px 28px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(135deg,#c4868e,#d4a0a0);">收下</button></div></div>`;
  const delay=a.r==="legend"?800:a.r==="epic"?600:a.r==="rare"?400:200;
  setTimeout(()=>{
    const card=document.getElementById("achCardInner");
    if(card){card.style.transition="opacity 0.6s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1)";card.style.opacity="1";card.style.transform="translate(-50%,-50%) scale(1)";}
  },delay);
}

function checkAchievements(){
  const t=tList(),hr=new Date().getHours(),td=todayStr(),yd=yesterdayStr();const unlocked=[];
  function tryU(id){if(S.ach[id])return;const a=ACHS.find(x=>x.id===id);if(!a)return;S.ach[id]={d:new Date().toISOString()};S.cp+=a.pts;S.tp+=a.pts;if(a.at)applyAttrs(a.at);S.h.unshift({t:"a",n:"🏆 "+a.name,p:a.pts,d:new Date().toISOString()});unlocked.push(a);}
  if(S.h.length>0)tryU("a01");
  if(hr>=0&&hr<5&&t.length>0)tryU("a02");
  if(t.includes("bath")&&t.includes("brush")&&t.includes("skincare")&&t.includes("undies_today")&&t.includes("socks_today"))tryU("a03");
  if(hasPenToday("pn_takeout")&&t.includes("cook"))tryU("a04");
  if(penStrk()>=3)tryU("a05");
  if(t.includes("cook")&&t.includes("dishes_today")&&t.includes("tidy")&&t.includes("mop"))tryU("a06");
  if(t.includes("vitamin")&&t.includes("foot_soak")&&t.includes("early_sleep")&&t.includes("water")&&t.includes("bowel"))tryU("a07");
  if((S.dailyPens[yd]||[]).includes("pn_late_sleep")&&t.includes("wake")&&(t.includes("exercise")||t.includes("badminton")||t.includes("run")))tryU("a08");
  if(taskStrk("water")>=14)tryU("a09");
  if(multiStrk(["no_sugar","no_snack"],10)>=10)tryU("a10");
  if(t.includes("gc_attend")&&t.includes("gc_review")&&t.includes("gc_homework"))tryU("a11");
  if(cnt("gc_mock")>=10)tryU("a12");
  if(taskStrk("gc_mock")>=3)tryU("a13");
  if(taskStrk("de_grammar")>=7)tryU("a14");
  if(["de_vocab","de_grammar","de_friends","de_speak"].some(id=>t.includes(id))&&["gc_attend","gc_review","gc_homework","gc_mock"].some(id=>t.includes(id)))tryU("a15");
  if((t.includes("badminton")||t.includes("exercise"))&&t.includes("run")&&t.includes("stretch"))tryU("a16");
  if(taskStrk("diet_meal")>=7)tryU("a17");
  if(cnt("say_no")>=5)tryU("a18");
  if(t.includes("piano")&&t.includes("sing")&&t.includes("dance_t"))tryU("a19");
  if((S.dailyPts[td]||0)>=100)tryU("a20");
  const fd=firstDate();if(fd&&daysBetween(fd.slice(0,10),td)>=30)tryU("a21");
  if(multiStrk(["early_sleep","wake"],14)>=14)tryU("a22");
  if(taskStrk("no_takeout")>=21)tryU("a23");
  if(choreStrk()>=7)tryU("a24");
  if(t.includes("gc_attend")&&t.includes("gc_review")&&t.includes("gc_homework")&&t.includes("gc_mock"))tryU("a25");
  if(cntFear()>=5)tryU("a26");
  if(t.includes("gc_mock")&&t.includes("de_vocab")&&t.includes("de_grammar")&&(t.includes("exercise")||t.includes("badminton")||t.includes("run")))tryU("a27");
  if(t.includes("de_vocab")&&t.includes("de_grammar")&&t.includes("de_friends")&&t.includes("de_speak"))tryU("a28");
  if(taskStrk("de_vocab")>=14)tryU("a29");
  if(cnt("de_speak")>=30)tryU("a30");
  if(grpStrk(["exercise","badminton","run","dance_t","stretch"],7)>=7)tryU("a31");
  if(multiStrk(["no_sugar","no_snack","water"],14)>=14)tryU("a32");
  if(t.includes("exercise")&&t.includes("early_sleep")&&t.includes("diet_meal")&&t.includes("water")&&t.includes("no_sugar"))tryU("a33");
  if(cnt("say_no")>=15)tryU("a34");
  if(cnt("face_fear")>=10)tryU("a35");
  if(t.includes("say_no")&&t.includes("face_fear")&&t.includes("social_out")&&t.includes("contact_teacher"))tryU("a36");
  if(cnt("reading")>=30)tryU("a37");
  if((S.attrs.grace||0)>=180)tryU("a38");
  if(fd&&daysBetween(fd.slice(0,10),td)>=100)tryU("a39");
  if(cnt("gc_pass")>0)tryU("a40");
  if(cnt("dr_ke1")>0&&cnt("dr_ke2")>0&&cnt("dr_ke3")>0&&cnt("dr_ke4")>0)tryU("a41");
  if(cnt("de_level")>0&&cnt("gc_pass")>0)tryU("a42");
  if(grpStrk(["exercise","badminton","run","dance_t","diet_meal","no_sugar"],30)>=30)tryU("a43");
  if(ATTRS.every(a=>(S.attrs[a.id]||0)>=50))tryU("a44");
  if(ATTRS.filter(a=>(S.attrs[a.id]||0)>=300).length>=5)tryU("a45");
  if(S.tp>=5000)tryU("a46");
  if(unlocked.length){saveState();render();_achQ.push(...unlocked);if(_achQ.length===unlocked.length)showAchPopup(_achQ.shift());}
}

  h+='<div class="pl-reward-row"><span class="pl-reward-label">D30</span><input class="pl-reward-input" type="text" id="plR30" placeholder="梦想第一步..." value="'+plEsc(pl.rewards.r30||'')+'"></div>';
  h+='<div class="pl-reward-row"><span class="pl-reward-label">D60</span><input class="pl-reward-input" type="text" id="plR60" placeholder="渐入佳境..." value="'+plEsc(pl.rewards.r60||'')+'"></div>';
  h+='<div class="pl-reward-row"><span class="pl-reward-label">D90</span><input class="pl-reward-input" type="text" id="plR90" placeholder="终极蜕变！" value="'+plEsc(pl.rewards.r90||'')+'"></div>';

    h+='<p style="font-size:0.75rem;color:#b08a8e;text-align:center;margin:8px 0;">还没有愿景 — 写下你瘦下来后想做的事 ✨</p>';
  } else {
    pl.visionItems.forEach(function(it,i){
      h+='<div class="pl-vision-item"><button class="del-v" onclick="plRemoveVision('+i+')">×</button><p>'+plEsc(it.text)+'</p>';

      h+='</div>';
    });
  }
  h+='</div>';

function plInitChart(){
  var ctx=document.getElementById('plWeightChart');if(!ctx)return;
  if(plChart){plChart.destroy();plChart=null;}
  var labels=[],weights=[];
  for(var i=1;i<=90;i++){if(S.pl.days[i]&&S.pl.days[i].weight){labels.push('D'+i);weights.push(parseFloat(S.pl.days[i].weight));}}
  plChart=new Chart(ctx,{type:'line',data:{labels:labels,datasets:[{label:'体重',data:weights,borderColor:'#c48e93',backgroundColor:'rgba(196,142,147,0.1)',fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:'#c48e93',borderWidth:2}]},options:{maintainAspectRatio:false,plugins:{legend:{display:false},annotation:{annotations:{goalLine:{type:'line',yMin:45,yMax:45,borderColor:'rgba(200,176,112,0.5)',borderWidth:1.5,borderDash:[6,4],label:{display:true,content:'目标 45kg',position:'end',font:{size:9,family:'Caveat'},color:'#c8b070',backgroundColor:'transparent'}}}}},scales:{y:{beginAtZero:false,grid:{color:'rgba(0,0,0,0.04)'}},x:{grid:{display:false}}}}});
}
function plOpenPanel(day){
  plCurrentDay=day;var d=S.pl.days[day]||{};
  document.getElementById('plPanelDate').innerText='第 '+day+' 天';
  document.getElementById('plInputWeight').value=d.weight||'';
  document.querySelectorAll('.pl-mood-btn').forEach(function(b){b.classList.remove('selected');});
  if(d.mood)document.querySelectorAll('.pl-mood-btn').forEach(function(b){if(b.textContent===d.mood)b.classList.add('selected');});
  var wc=d.water||0;document.getElementById('plWaterCount').innerText=wc;
  var wr=document.getElementById('plWaterRow');wr.innerHTML='';
  for(var i=1;i<=8;i++){var s=document.createElement('span');s.className='pl-water-cup'+(i<=wc?' filled':'');s.textContent='💧';s.onclick=(function(n){return function(){if(!S.pl.days[plCurrentDay])S.pl.days[plCurrentDay]={};S.pl.days[plCurrentDay].water=n;plOpenPanel(plCurrentDay);};})(i);wr.appendChild(s);}
  plRenderExercise(day);plRenderMeals(day);plUpdateDayTotal();
  document.getElementById('plOverlay').style.display='block';document.getElementById('plPanel').style.display='block';
}
function plSetMood(m){if(!S.pl.days[plCurrentDay])S.pl.days[plCurrentDay]={};S.pl.days[plCurrentDay].mood=m;document.querySelectorAll('.pl-mood-btn').forEach(function(b){b.classList.toggle('selected',b.textContent===m);});}
function plClosePanel(){document.getElementById('plOverlay').style.display='none';document.getElementById('plPanel').style.display='none';}
function plRenderExercise(day){
  var c=document.getElementById('plExContainer');c.innerHTML='';
  if(!S.pl.days[day])S.pl.days[day]={};if(!S.pl.days[day].exercises)S.pl.days[day].exercises=[];
  var items=S.pl.days[day].exercises;if(items.length===0)items.push({name:'',mins:'',cal:''});
  var s=document.createElement('div');s.className='pl-ex-section';s.innerHTML='<h4>🏃‍♀️ 运动打卡</h4>';
  items.forEach(function(it,idx){
    var r=document.createElement('div');r.className='pl-ex-row';
    r.innerHTML='<input type="text" placeholder="运动项目" value="'+plEsc(it.name||'')+'" onchange="plUpdateEx('+idx+',\'name\',this.value)"><input type="number" placeholder="0" value="'+(it.mins||'')+'" min="0" onchange="plUpdateEx('+idx+',\'mins\',this.value)"><span class="unit">分钟</span><input type="number" placeholder="0" value="'+(it.cal||'')+'" min="0" onchange="plUpdateEx('+idx+',\'cal\',this.value)"><span class="unit">kcal</span>'+(items.length>1?'<span class="rm" onclick="plRemoveEx('+idx+')" style="cursor:pointer;color:#e0bfc2;">×</span>':'');
    s.appendChild(r);
  });
  var ab=document.createElement('button');ab.className='pl-add-btn';ab.style.borderColor='#7a9a6a';ab.style.color='#7a9a6a';ab.textContent='+ 添加运动';
  ab.onclick=function(){S.pl.days[plCurrentDay].exercises.push({name:'',mins:'',cal:''});plRenderExercise(plCurrentDay);};s.appendChild(ab);
  var tm=items.reduce(function(a,i){return a+(parseInt(i.mins)||0);},0),tc=items.reduce(function(a,i){return a+(parseInt(i.cal)||0);},0);
  if(tm>0||tc>0){var d=document.createElement('div');d.className='pl-ex-total';d.textContent='共 '+tm+' 分钟 | 消耗 '+tc+' kcal';s.appendChild(d);}
  c.appendChild(s);
}
function plUpdateEx(i,f,v){S.pl.days[plCurrentDay].exercises[i][f]=v;plRenderExercise(plCurrentDay);plUpdateDayTotal();}
function plRemoveEx(i){S.pl.days[plCurrentDay].exercises.splice(i,1);plRenderExercise(plCurrentDay);plUpdateDayTotal();}
function plRenderMeals(day){
  var c=document.getElementById('plMealsContainer');c.innerHTML='';
  if(!S.pl.days[day])S.pl.days[day]={};if(!S.pl.days[day].meals)S.pl.days[day].meals={};
  plMealLabels.forEach(function(meal){
    if(!S.pl.days[day].meals[meal.key])S.pl.days[day].meals[meal.key]=[];
    var items=S.pl.days[day].meals[meal.key];if(items.length===0)items.push({name:'',cal:''});
    var s=document.createElement('div');s.className='pl-meal-section';s.innerHTML='<h4>'+meal.icon+' '+meal.name+'</h4>';
    items.forEach(function(it,idx){
      var r=document.createElement('div');r.className='pl-meal-row';
      r.innerHTML='<input type="text" placeholder="食物" value="'+plEsc(it.name||'')+'" onchange="plUpdateMeal(\''+meal.key+'\','+idx+',\'name\',this.value)"><input type="number" placeholder="0" value="'+(it.cal||'')+'" min="0" onchange="plUpdateMeal(\''+meal.key+'\','+idx+',\'cal\',this.value)"><span class="unit">kcal</span>'+(items.length>1?'<span class="rm" onclick="plRemoveMeal(\''+meal.key+'\','+idx+')" style="cursor:pointer;">×</span>':'');
      s.appendChild(r);
    });
    var ab=document.createElement('button');ab.className='pl-add-btn';ab.style.borderColor='#d6a6aa';ab.style.color='#d6a6aa';ab.textContent='+ 添加';
    ab.onclick=function(){S.pl.days[plCurrentDay].meals[meal.key].push({name:'',cal:''});plRenderMeals(plCurrentDay);plUpdateDayTotal();};s.appendChild(ab);
    var sub=items.reduce(function(a,i){return a+(parseFloat(i.cal)||0);},0);
    if(sub>0){var d=document.createElement('div');d.className='pl-meal-total';d.textContent='小计 '+sub+' kcal';s.appendChild(d);}
    c.appendChild(s);
  });
}
function plUpdateMeal(k,i,f,v){S.pl.days[plCurrentDay].meals[k][i][f]=v;plUpdateDayTotal();}
function plRemoveMeal(k,i){S.pl.days[plCurrentDay].meals[k].splice(i,1);plRenderMeals(plCurrentDay);plUpdateDayTotal();}
function plUpdateDayTotal(){
  var tIn=0,tOut=0;
  if(S.pl.days[plCurrentDay]&&S.pl.days[plCurrentDay].meals)plMealLabels.forEach(function(m){(S.pl.days[plCurrentDay].meals[m.key]||[]).forEach(function(i){tIn+=parseFloat(i.cal)||0;});});
  if(S.pl.days[plCurrentDay]&&S.pl.days[plCurrentDay].exercises)S.pl.days[plCurrentDay].exercises.forEach(function(i){tOut+=parseInt(i.cal)||0;});
  document.getElementById('plDayTotalCal').innerHTML='摄入 '+tIn+' − 运动 '+tOut+' = <strong>净摄入 '+(tIn-tOut)+' kcal</strong>';
}
function plSaveDay(){
  if(!S.pl.days[plCurrentDay])S.pl.days[plCurrentDay]={};
  S.pl.days[plCurrentDay].checked=true;
  var w=document.getElementById('plInputWeight').value;if(w)S.pl.days[plCurrentDay].weight=w;
  if(S.pl.days[plCurrentDay].meals)plMealLabels.forEach(function(m){var it=S.pl.days[plCurrentDay].meals[m.key];if(it)S.pl.days[plCurrentDay].meals[m.key]=it.filter(function(i){return i.name||i.cal;});});
  if(S.pl.days[plCurrentDay].exercises)S.pl.days[plCurrentDay].exercises=S.pl.days[plCurrentDay].exercises.filter(function(i){return i.name||i.mins||i.cal;});
  saveState();plClosePanel();renderPalace();flash('🌸 第 '+plCurrentDay+' 天打卡成功','earn');
}
function plSaveRewards(){S.pl.rewards.r30=(document.getElementById('plR30')||{}).value||'';S.pl.rewards.r60=(document.getElementById('plR60')||{}).value||'';S.pl.rewards.r90=(document.getElementById('plR90')||{}).value||'';saveState();}
function plShowWhisper(){document.getElementById('plWhisperText').textContent=plWhispers[Math.floor(Math.random()*plWhispers.length)];document.getElementById('plWhisperOv').style.display='block';document.getElementById('plWhisperPop').style.display='block';}
function plCloseWhisper(){document.getElementById('plWhisperOv').style.display='none';document.getElementById('plWhisperPop').style.display='none';}
function plOnImgSelected(input){
  var f=input.files[0];if(!f){plPendingImg=null;document.getElementById('plVisionImgName').innerText='未选择';return;}
  document.getElementById('plVisionImgName').innerText=f.name.length>12?f.name.substring(0,12)+'...':f.name;
  var reader=new FileReader();reader.onload=function(e){
    var img=new Image();img.onload=function(){var cv=document.createElement('canvas');var w=img.width,h=img.height;if(w>600){h=h*600/w;w=600;}cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);plPendingImg=cv.toDataURL('image/jpeg',0.7);};img.src=e.target.result;
  };reader.readAsDataURL(f);
}
function plAddVision(){
  var text=(document.getElementById('plVisionText')||{}).value||'';
  if(!text.trim()&&!plPendingImg)return;if(!S.pl.visionItems)S.pl.visionItems=[];
  S.pl.visionItems.push({text:text.trim(),img:plPendingImg||null});plPendingImg=null;saveState();renderPalace();flash('愿景已添加 ✨','earn');
}
function plRemoveVision(i){if(confirm('删除这条愿景？')){S.pl.visionItems.splice(i,1);saveState();renderPalace();}}
</script>

window.initWishState = function(){
  if(!S.wishes) S.wishes={};
  WISHES.forEach(function(w){
    if(!S.wishes[w.id]) S.wishes[w.id]={done:false,date:"",note:"",evidence:null};
  });
};
window.renderWishes = function(){
  initWishState();
  var done=WISHES.filter(function(w){return S.wishes[w.id]&&S.wishes[w.id].done;}).length;
  var total=WISHES.length;
  var h='<div style="text-align:center;margin-bottom:20px;">'+
    '<div style="font-family:Caveat,cursive;font-size:14px;color:#b09898;letter-spacing:2px;margin-bottom:4px;">✧ Future Me ✧</div>'+
    '<div style="font-family:Playfair Display,serif;font-size:22px;font-weight:600;color:#6a5555;margin-bottom:8px;">愿望星河</div>'+
    '<div style="font-family:Outfit;font-size:13px;color:#b09898;">'+done+' / '+total+' 已实现</div>'+
    '<div style="height:5px;border-radius:3px;background:rgba(219,147,158,0.12);overflow:hidden;margin:12px 20px 0;">'+
    '<div style="height:100%;border-radius:3px;width:'+(total>0?done/total*100:0)+'%;background:linear-gradient(90deg,#c4a0b0,#a0b8c4,#c4b8a0);transition:width 0.5s ease;"></div></div></div>';

    var ws=S.wishes[w.id]||{};var isDone=ws.done;
    h+='<div class="wish-card" onclick="openWishDetail(\''+w.id+'\')" style="--wish-color:'+w.color+';--wish-glow:'+w.color+'40;">'+
      '<div class="wish-card-inner" style="border:1.5px solid '+(isDone?w.color+'60':w.color+'25')+';">'+
      '<div class="wish-card-bg" style="background:'+w.bg+';"><div class="wish-decor">'+wishDecorSVG(w.decor,w.color)+'</div></div>'+
      '<img class="wish-card-img" src="'+w.img+'" alt="'+w.name+'" loading="lazy" onerror="this.style.display=\'none\'">'+
      '<div class="wish-card-frost'+(isDone?' cleared':'')+'"></div>'+
      (isDone?'':'<div class="wish-card-shimmer"></div>')+
      (isDone?'':'<div class="wish-card-lock">🔒</div>')+
      (isDone?'<div class="wish-card-done-badge">✓</div>':'')+
      '<div class="wish-card-info"><div class="wish-card-name">'+w.name+'</div>'+

  });
  h+='</div>';
  document.getElementById('content-wishes').innerHTML=h;
};
window.openWishDetail = function(id){
  var w=WISHES.find(function(x){return x.id===id;});if(!w)return;
  var ws=S.wishes[id]||{};var isDone=ws.done;
  var ov=document.getElementById('wishDetailOv');
  var panel=ov.querySelector('.wish-detail-panel');
  panel.style.background=isDone?'linear-gradient(180deg,'+w.color+'18,#1a1418 30%)':'linear-gradient(180deg,'+w.color+'10,#1a1418 30%)';
  panel.style.color='#e8dcd8';
  var h='<div class="wish-detail-handle"></div>';
  h+='<div class="wish-detail-img-wrap" style="border:1px solid '+w.color+'30;"><img class="wish-detail-img" src="'+w.img+'" alt="'+w.name+'" onerror="this.style.display=\'none\'">'+(isDone?'':'<div class="wish-detail-img-frost"></div>')+'</div>';
  h+='<div class="wish-detail-title" style="color:'+w.accent+';">'+w.name+'</div>';
  h+='<div class="wish-detail-desc">'+w.desc+'</div>';
  if(isDone){
    h+='<div class="wish-achieved-info"><div class="wish-achieved-date">🗓 '+(ws.date||'未记录日期')+'</div>'+(ws.note?'<div class="wish-achieved-note">'+ws.note+'</div>':'')+(ws.evidence?'<img class="wish-achieved-evidence" src="'+ws.evidence+'" alt="evidence">':'')+'</div>';

  }
  panel.innerHTML=h;
  ov.classList.add('on');
};
window.closeWishDetail = function(){
  document.getElementById('wishDetailOv').classList.remove('on');
};
window.wishPreviewEvidence = function(input){
  var f=input.files[0];var prev=document.getElementById('wishEvidencePreview');
  if(!f){prev.classList.add('hidden');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();img.onload=function(){
      var cv=document.createElement('canvas');var w=img.width,h=img.height;
      if(w>800){h=h*800/w;w=800;}cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      prev.src=cv.toDataURL('image/jpeg',0.7);prev.classList.remove('hidden');
    };img.src=e.target.result;
  };reader.readAsDataURL(f);
};
window.confirmWishAchieve = function(id){
  var w=WISHES.find(function(x){return x.id===id;});if(!w)return;
  var date=document.getElementById('wishAchDate').value||new Date().toISOString().slice(0,10);
  var note=(document.getElementById('wishAchNote').value||'').trim();
  var prev=document.getElementById('wishEvidencePreview');
  var evidence=prev&&!prev.classList.contains('hidden')?prev.src:null;
  S.wishes[id]={done:true,date:date,note:note,evidence:evidence};
  S.h.unshift({t:"a",n:"🌟 愿望达成："+w.name,p:0,d:new Date().toISOString()});
  saveState();closeWishDetail();
  setTimeout(function(){startWishCelebration(w);},300);
};
window.startWishCelebration = function(w){
  var ov=document.getElementById('wishCelebOv');

  h+='<div style="position:absolute;top:50%;left:50%;width:100px;height:100px;border-radius:50%;transform:translate(-50%,-50%) scale(0);background:radial-gradient(circle,'+w.color+'80,'+w.accent+'40,transparent);animation:wishRevealWave 1.2s ease-out forwards;"></div>';
  h+='<div style="position:absolute;top:50%;left:50%;width:100px;height:100px;border-radius:50%;transform:translate(-50%,-50%) scale(0);background:radial-gradient(circle,'+w.accent+'60,transparent);animation:wishRevealWave 1.2s ease-out 0.3s forwards;"></div>';
  for(var i=0;i<15;i++){
    var x=10+Math.random()*80;var del=0.5+Math.random()*2;var sz=10+Math.random()*16;
    h+='<div style="position:absolute;left:'+x+'%;bottom:0;font-size:'+sz+'px;pointer-events:none;color:'+w.color+';animation:wishStarRise 1.5s ease-out '+del+'s forwards;opacity:0;">✦</div>';
  }
  h+='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:75vw;max-width:320px;border-radius:20px;overflow:hidden;box-shadow:0 16px 60px rgba(0,0,0,0.4);border:2px solid '+w.color+'60;animation:wishGlowPulse 2s ease-in-out infinite;--wish-glow:'+w.color+'50;"><img src="'+w.img+'" alt="'+w.name+'" style="width:100%;display:block;animation:wishImgClear 2.5s ease-out forwards;" onerror="this.parentElement.style.background=\''+w.bg+'\'"><div style="position:absolute;bottom:0;left:0;right:0;padding:24px 20px;text-align:center;background:linear-gradient(transparent,rgba(0,0,0,0.7));animation:wishBannerSlide 0.8s ease-out 1.5s both;"><div style="font-family:Playfair Display,serif;font-size:20px;font-weight:600;color:#fff;letter-spacing:1px;margin-bottom:4px;">'+w.name+'</div><div style="font-size:12px;color:rgba(255,255,255,0.6);">✦ 愿望达成 ✦</div></div></div>';
  ov.innerHTML=h;
  ov.classList.add('on');
  spawnConfetti(80,[w.color,w.accent,'#fff','#ffd700']);
  setTimeout(function(){spawnConfetti(60,[w.color,w.accent,'#e8e8e8']);},600);
  setTimeout(function(){spawnConfetti(40,[w.color,w.accent,'#ffd700','#fff']);},1200);
};
window.endWishCelebration = function(){
  var ov=document.getElementById('wishCelebOv');
  ov.classList.remove('on');ov.innerHTML='';
  renderWishes();
};
if(typeof S !== "undefined"){initWishState();}
})();

.sv-jar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sv-jar-title{display:flex;align-items:center;gap:9px;}
.sv-jar-emoji{font-size:26px;filter:drop-shadow(0 2px 4px rgba(196,142,147,0.3));}
.sv-jar-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#8a5a60;letter-spacing:0.5px;}
.sv-jar-sub{font-family:'Caveat',cursive;font-size:12px;color:#b08a8e;margin-top:1px;}
.sv-jar-pct{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(135deg,#c48e93,#e0bfc2);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.sv-jar-vis{position:relative;height:120px;border-radius:14px;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,0.4),rgba(245,230,232,0.3));border:1.5px solid rgba(219,147,158,0.25);margin-bottom:14px;}
.sv-water{position:absolute;left:0;right:0;bottom:0;transition:height 1.1s cubic-bezier(0.34,1.2,0.4,1);overflow:hidden;}
.sv-water-fill{position:absolute;inset:0;background:linear-gradient(180deg,rgba(224,191,194,0.85),rgba(196,142,147,0.8));}
.sv-water-surface{position:absolute;top:-8px;left:0;width:200%;height:16px;background:radial-gradient(circle at 20% 100%,rgba(255,255,255,0.5) 0 4px,transparent 5px) repeat-x;background-size:40px 16px;animation:svWaterWave 3s linear infinite;}
.sv-water-shine{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.25) 50%,transparent 70%);background-size:200% 100%;animation:svShimmerSweep 3.5s ease-in-out infinite;}
.sv-jar-amount{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;text-align:center;pointer-events:none;}
.sv-jar-amount .now{font-family:'Outfit';font-size:24px;font-weight:800;color:#6a4a50;text-shadow:0 1px 6px rgba(255,255,255,0.8);}
.sv-jar-amount .goal{font-family:'Outfit';font-size:12px;color:#8a6a6e;margin-top:1px;text-shadow:0 1px 4px rgba(255,255,255,0.8);}
.sv-bubble{position:absolute;border-radius:50%;background:rgba(255,255,255,0.4);pointer-events:none;}
.sv-jar-stats{display:flex;justify-content:space-between;font-size:12px;color:#a08888;margin-bottom:12px;font-family:'Outfit';}
.sv-jar-stats b{color:#c48e93;font-weight:700;}
.sv-jar-actions{display:flex;gap:8px;}
.sv-btn{flex:1;padding:11px;border-radius:11px;font-size:13px;font-weight:600;font-family:'Noto Sans SC';transition:transform 0.15s;}
.sv-btn:active{transform:scale(0.96);}
.sv-btn-deposit{background:linear-gradient(135deg,#c48e93,#d6a6aa);color:#fff;}
.sv-btn-minus{background:rgba(219,147,158,0.12);color:#b08a8e;border:1px solid rgba(219,147,158,0.2);flex:0 0 auto;width:46px;}
.sv-btn-edit{background:rgba(219,147,158,0.08);color:#b08a8e;border:1px solid rgba(219,147,158,0.15);flex:0 0 auto;width:46px;}
.sv-input-row{display:flex;gap:8px;margin-top:12px;animation:svPopIn 0.3s ease-out;}
.sv-input{flex:1;padding:10px 12px;border-radius:10px;font-size:15px;font-family:'Outfit';background:rgba(255,255,255,0.7);border:1px solid rgba(219,147,158,0.25);color:#5a4a4a;outline:none;text-align:center;}
.sv-input:focus{border-color:#c48e93;}
.sv-quick{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.sv-quick-btn{padding:6px 12px;border-radius:8px;font-size:12px;font-family:'Outfit';font-weight:600;background:rgba(219,147,158,0.1);color:#c48e93;border:1px solid rgba(219,147,158,0.2);}
.sv-quick-btn:active{background:rgba(219,147,158,0.25);}
.sv-log{margin-top:8px;}
.sv-log-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:9px;background:rgba(255,255,255,0.4);margin-bottom:5px;border-left:3px solid rgba(196,142,147,0.4);font-size:13px;}
.sv-log-item.out{border-left-color:rgba(180,140,140,0.4);}
.sv-log-date{font-size:11px;color:#b09898;font-family:'Outfit';}
.sv-log-amt{font-family:'Outfit';font-weight:700;color:#c48e93;}
.sv-log-amt.out{color:#c08888;}
.sv-coin{position:fixed;z-index:3000;font-size:26px;pointer-events:none;animation:svCoinDrop 0.9s cubic-bezier(0.3,0.7,0.4,1) forwards;}
.sv-float-pts{position:fixed;z-index:3001;font-family:'Outfit';font-weight:800;font-size:20px;color:#c48e93;pointer-events:none;animation:svFloatUp 1.2s ease-out forwards;text-shadow:0 2px 8px rgba(255,255,255,0.9);}
.sv-fw{position:fixed;width:8px;height:8px;border-radius:50%;z-index:3000;pointer-events:none;animation:svFireworkBurst 1s ease-out forwards;}
.sv-ring{position:fixed;border-radius:50%;border:3px solid;z-index:2999;pointer-events:none;animation:svRingExpand 1s ease-out forwards;}
.sv-done-banner{text-align:center;padding:16px;border-radius:14px;margin-bottom:14px;background:linear-gradient(135deg,rgba(196,142,147,0.15),rgba(224,191,194,0.08));border:1px solid rgba(196,142,147,0.3);animation:svPopIn 0.5s ease-out;}
.sv-done-banner .big{font-size:28px;margin-bottom:4px;}
.sv-done-banner .txt{font-family:'Playfair Display',serif;font-size:15px;color:#8a5a60;}
.sv-header{text-align:center;margin-bottom:18px;}
.sv-header .eye{font-family:'Caveat',cursive;font-size:15px;color:#b08a8e;letter-spacing:2px;margin-bottom:2px;}
.sv-header .ttl{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:#6a5555;}
.sv-header .total{font-family:'Outfit';font-size:12px;color:#b09898;margin-top:6px;}
.sv-header .total b{color:#c48e93;font-size:15px;}
.sv-edit-panel{padding:14px;border-radius:12px;background:rgba(219,147,158,0.06);border:1px solid rgba(219,147,158,0.2);margin-top:10px;animation:svPopIn 0.3s ease;}
.sv-edit-panel label{display:block;color:#c48e93;margin:8px 0 4px;font-family:'Caveat',cursive;font-size:14px;}
.sv-edit-panel input{width:100%;padding:9px 11px;border-radius:9px;font-size:14px;font-family:'Outfit';background:rgba(255,255,255,0.7);border:1px solid rgba(219,147,158,0.25);color:#5a4a4a;outline:none;box-sizing:border-box;}
.sv-stars-deco{position:absolute;pointer-events:none;font-size:11px;animation:svStarTwinkle 2s ease-in-out infinite;}
</style>
<script>
(function(){
"use strict";
var SV_DEFAULTS=[
  {id:"phone",emoji:"📱",name:"Flip 手机基金",sub:"换一台自己的小折叠",goal:8000,unit:"¥",color:"#c48e93"},
  {id:"api",emoji:"🔮",name:"API 基金",sub:"小克的能量池",goal:50,unit:"$",color:"#9a8ab0"}
];
function svInit(){
  if(typeof S==="undefined")return;
  if(!S.savings){S.savings={jars:{},log:[]};}
  if(!S.savings.jars)S.savings.jars={};
  if(!S.savings.log)S.savings.log=[];
  SV_DEFAULTS.forEach(function(d){
    if(!S.savings.jars[d.id]){
      S.savings.jars[d.id]={emoji:d.emoji,name:d.name,sub:d.sub,goal:d.goal,saved:0,unit:d.unit,color:d.color};
    }
  });
}
function svInjectTab(){
  var anchor=document.getElementById("tab-tasks");
  if(!anchor)return;
  var bar=anchor.parentElement;
  if(document.getElementById("tab-savings"))return;
  var btn=document.createElement("button");
  btn.className="tab-btn tab-inactive";
  btn.id="tab-savings";
  btn.style.cssText="flex:0 0 auto;min-width:52px;";
  btn.textContent="💰 攒钱";
  btn.onclick=svSwitchTo;
  bar.appendChild(btn);
  var host=document.querySelector('[id^="content-tasks"]').parentElement;
  if(!document.getElementById("content-savings")){
    var div=document.createElement("div");
    div.id="content-savings";
    div.className="hidden";
    host.appendChild(div);
  }
}
var SV_TABS=["tasks","attrs","achieve","palace","shop","history","wishes","savings"];
function svSwitchTo(){
  SV_TABS.forEach(function(k){
    var c=document.getElementById("content-"+k);
    var t=document.getElementById("tab-"+k);
    if(c)c.classList.toggle("hidden",k!=="savings");
    if(t)t.className="tab-btn "+(k==="savings"?"tab-active":"tab-inactive");
  });
  svRender();
}
function svHookOriginalTabs(){
  ["tasks","attrs","achieve","palace","shop","history","wishes"].forEach(function(k){
    var t=document.getElementById("tab-"+k);
    if(!t)return;
    t.addEventListener("click",function(){
      var sc=document.getElementById("content-savings");
      var st=document.getElementById("tab-savings");
      if(sc)sc.classList.add("hidden");
      if(st)st.className="tab-btn tab-inactive";
    });
  });
}
function svFmt(n){return (Math.round(n*100)/100).toString();}
function svRender(){
  svInit();
  var host=document.getElementById("content-savings");
  if(!host)return;
  var jars=S.savings.jars;
  var ids=SV_DEFAULTS.map(function(d){return d.id;});
  var h='<div class="sv-header"><div class="eye">✦ SAVING JARS ✦</div><div class="ttl">攒钱罐</div>';
  h+='<div class="total">每一笔都是离目标更近一步 💗</div></div>';
  ids.forEach(function(id){
    var j=jars[id];if(!j)return;
    var pct=j.goal>0?Math.min(100,j.saved/j.goal*100):0;
    var pctR=Math.round(pct);
    var done=j.saved>=j.goal&&j.goal>0;
    var remain=Math.max(0,j.goal-j.saved);
    h+='<div class="sv-jar-card'+(done?' complete':'')+'" id="sv-card-'+id+'">';
    if(done){
      h+='<div class="sv-done-banner"><div class="big">🎉✨🎊</div><div class="txt">「'+j.name+'」目标达成！</div></div>';
    }
    h+='<div class="sv-jar-head"><div class="sv-jar-title"><span class="sv-jar-emoji">'+j.emoji+'</span><div><div class="sv-jar-name">'+j.name+'</div><div class="sv-jar-sub">'+(j.sub||"")+'</div></div></div><div class="sv-jar-pct">'+pctR+'%</div></div>';
    h+='<div class="sv-jar-vis" id="sv-vis-'+id+'">';
    h+='<div class="sv-water" id="sv-water-'+id+'" style="height:'+pct+'%;"><div class="sv-water-fill" style="background:linear-gradient(180deg,'+j.color+'cc,'+j.color+'aa);"></div><div class="sv-water-surface"></div><div class="sv-water-shine"></div></div>';
    h+='<div class="sv-jar-amount"><div class="now">'+j.unit+svFmt(j.saved)+'</div><div class="goal">/ '+j.unit+svFmt(j.goal)+'</div></div>';
    h+='</div>';
    h+='<div class="sv-jar-stats"><span>已攒 <b>'+j.unit+svFmt(j.saved)+'</b></span><span>还差 <b>'+j.unit+svFmt(remain)+'</b></span></div>';
    h+='<div class="sv-jar-actions"><button class="sv-btn sv-btn-deposit" onclick="svToggleInput(\''+id+'\')">＋ 存入</button><button class="sv-btn sv-btn-minus" onclick="svToggleInput(\''+id+'\',true)">－</button><button class="sv-btn sv-btn-edit" onclick="svToggleEdit(\''+id+'\')">⚙</button></div>';
    h+='<div id="sv-inp-'+id+'"></div>';
    h+='<div id="sv-edit-'+id+'"></div>';
    h+='</div>';
  });
  if(S.savings.log.length){
    h+='<div style="margin-top:8px;"><div style="font-family:Playfair Display,serif;font-size:14px;color:#8a5a60;margin-bottom:8px;letter-spacing:1px;">📜 存取记录</div><div class="sv-log">';
    S.savings.log.slice(0,30).forEach(function(e){
      var jname=jars[e.jar]?jars[e.jar].name:e.jar;
      var unit=jars[e.jar]?jars[e.jar].unit:"";
      var out=e.amt<0;
      h+='<div class="sv-log-item'+(out?' out':'')+'"><div><div style="font-size:13px;color:#6a5555;">'+(jars[e.jar]?jars[e.jar].emoji:"")+' '+jname+'</div><div class="sv-log-date">'+svDate(e.d)+'</div></div><div class="sv-log-amt'+(out?' out':'')+'">'+(out?"-":"+")+unit+svFmt(Math.abs(e.amt))+'</div></div>';
    });
    h+='</div></div>';
  }
  host.innerHTML=h;
}
function svDate(iso){var x=new Date(iso);return (x.getMonth()+1)+"/"+x.getDate()+" "+String(x.getHours()).padStart(2,"0")+":"+String(x.getMinutes()).padStart(2,"0");}
window.svToggleInput=function(id,isMinus){
  var box=document.getElementById("sv-inp-"+id);
  if(!box)return;
  if(box.innerHTML){box.innerHTML="";return;}
  document.getElementById("sv-edit-"+id).innerHTML="";
  var j=S.savings.jars[id];
  var quick=j.unit==="$"?[5,10,20,50]:[100,500,1000,2000];
  var h='<div class="sv-input-row"><input class="sv-input" id="sv-val-'+id+'" type="number" inputmode="decimal" placeholder="'+(isMinus?"取出":"存入")+' '+j.unit+'"><button class="sv-btn '+(isMinus?'sv-btn-minus':'sv-btn-deposit')+'" style="flex:0 0 auto;width:64px;" onclick="svDoDeposit(\''+id+'\','+(isMinus?'true':'false')+')">'+(isMinus?'取出':'确认')+'</button></div>';
  h+='<div class="sv-quick">';
  quick.forEach(function(q){h+='<button class="sv-quick-btn" onclick="document.getElementById(\'sv-val-'+id+'\').value='+q+'">'+j.unit+q+'</button>';});
  h+='</div>';
  box.innerHTML=h;
  setTimeout(function(){var el=document.getElementById("sv-val-"+id);if(el)el.focus();},50);
};
window.svToggleEdit=function(id){
  var box=document.getElementById("sv-edit-"+id);
  if(!box)return;
  if(box.innerHTML){box.innerHTML="";return;}
  document.getElementById("sv-inp-"+id).innerHTML="";
  var j=S.savings.jars[id];
  var h='<div class="sv-edit-panel"><label>目标金额（'+j.unit+'）</label><input id="sv-goal-'+id+'" type="number" inputmode="decimal" value="'+j.goal+'"><label>当前已攒（手动校正）</label><input id="sv-saved-'+id+'" type="number" inputmode="decimal" value="'+j.saved+'"><button class="sv-btn sv-btn-deposit" style="width:100%;margin-top:12px;" onclick="svSaveEdit(\''+id+'\')">保存设置</button></div>';
  box.innerHTML=h;
};
window.svSaveEdit=function(id){
  var j=S.savings.jars[id];
  var g=parseFloat(document.getElementById("sv-goal-"+id).value);
  var s=parseFloat(document.getElementById("sv-saved-"+id).value);
  if(!isNaN(g)&&g>0)j.goal=g;
  if(!isNaN(s)&&s>=0)j.saved=s;
  if(typeof saveState==="function")saveState();
  svRender();
  if(typeof flash==="function")flash("⚙ 设置已保存","card");
};
window.svDoDeposit=function(id,isMinus){
  var el=document.getElementById("sv-val-"+id);
  if(!el)return;
  var v=parseFloat(el.value);
  if(isNaN(v)||v<=0){if(typeof flash==="function")flash("输入一个金额吧","fail");return;}
  var j=S.savings.jars[id];
  var before=j.saved;
  if(isMinus){
    j.saved=Math.max(0,j.saved-v);
    S.savings.log.unshift({jar:id,amt:-v,d:new Date().toISOString()});
  }else{
    j.saved=j.saved+v;
    S.savings.log.unshift({jar:id,amt:v,d:new Date().toISOString()});
  }
  if(S.savings.log.length>200)S.savings.log.length=200;
  var justDone=before<j.goal&&j.saved>=j.goal&&j.goal>0;
  if(typeof saveState==="function")saveState();
  svRender();
  if(!isMinus){
    svCoinRain(id);
    svFloatPts(id,"+"+j.unit+svFmt(v));
    if(typeof flash==="function")flash("💰 "+j.unit+svFmt(v)+" 存进「"+j.name+"」了！",justDone?"big":"earn");
    if(justDone){setTimeout(function(){svFireworks();},400);}
  }else{
    if(typeof flash==="function")flash("取出 "+j.unit+svFmt(v),"penalty");
  }
};
function svCoinRain(id){
  var vis=document.getElementById("sv-vis-"+id);
  if(!vis)return;
  var r=vis.getBoundingClientRect();
  var coins=["🪙","💰","✨","🌸","💗"];
  var n=12;
  for(var i=0;i<n;i++){
    (function(i){
      setTimeout(function(){
        var c=document.createElement("div");
        c.className="sv-coin";
        c.textContent=coins[Math.floor(Math.random()*coins.length)];
        c.style.left=(r.left+10+Math.random()*(r.width-30))+"px";
        c.style.top=(r.top-10)+"px";
        document.body.appendChild(c);
        setTimeout(function(){c.remove();},950);
      },i*60);
    })(i);
  }
  var w=document.getElementById("sv-water-"+id);
  if(w){
    for(var b=0;b<6;b++){
      var bub=document.createElement("div");
      bub.className="sv-bubble";
      var sz=4+Math.random()*8;
      bub.style.cssText="width:"+sz+"px;height:"+sz+"px;left:"+(10+Math.random()*80)+"%;bottom:4px;animation:svBubbleRise "+(1+Math.random())+"s ease-out forwards;";
      w.appendChild(bub);
      (function(bub){setTimeout(function(){bub.remove();},1800);})(bub);
    }
  }
}
function svFloatPts(id,txt){
  var card=document.getElementById("sv-card-"+id);
  if(!card)return;
  var r=card.getBoundingClientRect();
  var f=document.createElement("div");
  f.className="sv-float-pts";
  f.textContent=txt;
  f.style.left=(r.left+r.width/2-20)+"px";
  f.style.top=(r.top+40)+"px";
  document.body.appendChild(f);
  setTimeout(function(){f.remove();},1250);
}
function svFireworks(){
  var cx=window.innerWidth/2, cy=window.innerHeight/2;
  var cols=["#c48e93","#e0bfc2","#d4a840","#9a8ab0","#c9b8a8","#ffffff","#e8b4b8"];
  for(var ringi=0;ringi<3;ringi++){
    (function(ringi){
      setTimeout(function(){
        var ring=document.createElement("div");
        ring.className="sv-ring";
        var sz=40;
        ring.style.cssText="width:"+sz+"px;height:"+sz+"px;left:"+cx+"px;top:"+cy+"px;border-color:"+cols[ringi%cols.length]+";";
        document.body.appendChild(ring);
        setTimeout(function(){ring.remove();},1000);
      },ringi*250);
    })(ringi);
  }
  function burst(bx,by,count){
    for(var i=0;i<count;i++){
      var p=document.createElement("div");
      p.className="sv-fw";
      var ang=Math.random()*Math.PI*2;
      var dist=40+Math.random()*120;
      p.style.setProperty("--fx",Math.cos(ang)*dist+"px");
      p.style.setProperty("--fy",Math.sin(ang)*dist+"px");
      p.style.left=bx+"px";p.style.top=by+"px";
      p.style.background=cols[Math.floor(Math.random()*cols.length)];
      var sz=4+Math.random()*6;
      p.style.width=sz+"px";p.style.height=sz+"px";
      p.style.borderRadius=Math.random()>0.5?"50%":"1px";
      document.body.appendChild(p);
      (function(p){setTimeout(function(){p.remove();},1050);})(p);
    }
  }
  burst(cx,cy,40);
  setTimeout(function(){burst(cx-90,cy-40,30);},300);
  setTimeout(function(){burst(cx+90,cy-30,30);},500);
  setTimeout(function(){burst(cx,cy+50,35);},700);
  if(typeof spawnConfetti==="function"){
    spawnConfetti(100,cols);
    setTimeout(function(){spawnConfetti(60,cols);},500);
  }
}
function svBoot(){
  if(typeof S==="undefined"){setTimeout(svBoot,300);return;}
  svInit();
  svInjectTab();
  svHookOriginalTabs();
  if(typeof saveState==="function")saveState();
}
if(document.readyState==="complete"||document.readyState==="interactive"){setTimeout(svBoot,400);}
else{document.addEventListener("DOMContentLoaded",function(){setTimeout(svBoot,400);});}
})();
</script>
<!-- ════════════ 攒钱罐模块结束 ════════════ -->
</body></html>
