<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Love">
<meta name="theme-color" content="#0f0b1a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>My Love</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0b1a;--bg2:#161225;--bg3:#1c1630;
  --silver:#a8b4c8;--silver-dim:#6a7a94;--silver-bright:#c8d4e8;
  --lavender:#b8a0d0;--lavender-dim:#8a70a8;--lavender-bright:#d4c0e8;
  --accent:#7a8aaa;--accent-glow:rgba(122,138,170,0.25);
  --bubble-his:#1a2238;--bubble-his-border:rgba(168,180,200,0.12);
  --bubble-her:#241830;--bubble-her-border:rgba(184,160,208,0.12);
  --text:#d8dce8;--text-dim:#7a8098;--text-bright:#eef0f6;
  --danger:#c07070;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow:hidden;-webkit-tap-highlight-color:transparent;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(168,180,200,0.15);border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:0.4;}50%{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%);}to{opacity:1;transform:translateY(0);}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--accent-glow);}50%{box-shadow:0 0 40px var(--accent-glow);}}
@keyframes typing{0%{opacity:0.3;}50%{opacity:1;}100%{opacity:0.3;}}
@keyframes vibrate{0%,100%{transform:translateX(0);}25%{transform:translateX(-1px);}75%{transform:translateX(1px);}}

/* ─── Login ─── */
#loginScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:40px 32px;}
.login-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--silver-bright);letter-spacing:2px;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text-dim);letter-spacing:4px;margin-bottom:40px;}
.login-input{width:100%;max-width:280px;padding:14px 18px;border-radius:14px;border:1px solid rgba(168,180,200,0.15);background:var(--bg2);color:var(--text);font-size:16px;text-align:center;outline:none;letter-spacing:4px;-webkit-text-security:disc;transition:border-color 0.3s;}
.login-input:focus{border-color:var(--silver);}
.login-btn{margin-top:20px;padding:14px 48px;border-radius:14px;background:linear-gradient(135deg,var(--silver-dim),var(--lavender-dim));color:#fff;font-size:14px;font-weight:500;letter-spacing:3px;border:none;cursor:pointer;transition:transform 0.15s;}
.login-btn:active{transform:scale(0.96);}
.login-error{margin-top:12px;font-size:13px;color:var(--danger);min-height:20px;}

/* ─── Chat Screen ─── */
#chatScreen{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg);}

/* Header */
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));background:var(--bg2);border-bottom:1px solid rgba(168,180,200,0.06);z-index:10;flex-shrink:0;}
.chat-header-left{display:flex;align-items:center;gap:10px;}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--silver-dim),var(--lavender-dim));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.header-info .name{font-size:15px;font-weight:600;color:var(--silver-bright);}
.header-info .status{font-size:11px;display:flex;align-items:center;gap:4px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#6ab070;}
.status-dot.thinking{background:var(--lavender);animation:pulse 1s infinite;}
.header-actions{display:flex;gap:4px;}
.header-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-dim);background:transparent;transition:background 0.2s;}
.header-btn:active{background:rgba(168,180,200,0.1);}

/* Pinned */
.pinned-bar{padding:8px 16px;background:rgba(168,180,200,0.04);border-bottom:1px solid rgba(168,180,200,0.06);display:flex;align-items:center;gap:8px;font-size:12px;color:var(--silver);flex-shrink:0;cursor:pointer;}
.pinned-bar .pin-icon{font-size:14px;}
.pinned-bar .pin-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-dim);}
.pinned-bar .pin-close{font-size:14px;color:var(--text-dim);padding:2px;}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch;}
.msg-row{display:flex;animation:fadeIn 0.3s ease-out;max-width:82%;}
.msg-row.his{align-self:flex-start;}
.msg-row.mine{align-self:flex-end;}
.msg-bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.7;word-break:break-word;position:relative;}
.msg-row.his .msg-bubble{background:var(--bubble-his);border:1px solid var(--bubble-his-border);border-top-left-radius:4px;color:var(--silver-bright);}
.msg-row.mine .msg-bubble{background:var(--bubble-her);border:1px solid var(--bubble-her-border);border-top-right-radius:4px;color:var(--lavender-bright);}
.msg-time{font-size:10px;color:var(--text-dim);margin-top:3px;padding:0 4px;}
.msg-row.his .msg-time{text-align:left;}
.msg-row.mine .msg-time{text-align:right;}
.msg-actions{display:none;position:absolute;top:-28px;right:0;background:var(--bg3);border-radius:8px;padding:2px;border:1px solid rgba(168,180,200,0.1);z-index:5;}
.msg-bubble:active .msg-actions{display:flex;gap:2px;}
.msg-action-btn{padding:4px 8px;border-radius:6px;font-size:11px;color:var(--text-dim);background:transparent;}
.msg-action-btn:active{background:rgba(168,180,200,0.1);}

/* Typing indicator */
.typing-indicator{display:none;align-self:flex-start;padding:10px 16px;gap:4px;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--silver-dim);animation:typing 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}

/* Input area */
.input-area{padding:8px 12px;padding-bottom:max(8px,env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid rgba(168,180,200,0.06);display:flex;align-items:flex-end;gap:8px;flex-shrink:0;}
.input-wrap{flex:1;background:var(--bg3);border-radius:20px;border:1px solid rgba(168,180,200,0.08);display:flex;align-items:flex-end;padding:4px 4px 4px 16px;transition:border-color 0.3s;}
.input-wrap:focus-within{border-color:rgba(168,180,200,0.2);}
.chat-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;font-family:inherit;padding:8px 0;max-height:120px;resize:none;line-height:1.5;}
.chat-input::placeholder{color:var(--text-dim);}
.voice-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-dim);flex-shrink:0;transition:all 0.2s;}
.voice-btn:active{background:rgba(168,180,200,0.1);}
.voice-btn.recording{background:rgba(192,112,112,0.2);color:var(--danger);animation:pulse 1s infinite;}
.send-btn{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--silver-dim),var(--lavender-dim));display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;transition:transform 0.15s,opacity 0.2s;opacity:0.4;}
.send-btn.active{opacity:1;}
.send-btn:active{transform:scale(0.9);}

/* ─── Settings Panel ─── */
.panel-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,0);pointer-events:none;transition:background 0.3s;}
.panel-overlay.on{background:rgba(0,0,0,0.5);pointer-events:all;}
.settings-panel{position:fixed;top:0;right:-100%;width:85%;max-width:360px;height:100%;z-index:51;background:var(--bg2);border-left:1px solid rgba(168,180,200,0.06);transition:right 0.4s cubic-bezier(0.16,1,0.3,1);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px;padding-top:max(20px,env(safe-area-inset-top));}
.panel-overlay.on .settings-panel{right:0;}
.settings-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--silver-bright);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
.settings-section{margin-bottom:24px;}
.settings-label{font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.settings-card{padding:14px;border-radius:12px;background:var(--bg3);border:1px solid rgba(168,180,200,0.06);margin-bottom:8px;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(168,180,200,0.04);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-size:14px;color:var(--text);display:flex;align-items:center;gap:8px;}
.settings-row-value{font-size:13px;color:var(--text-dim);}
.toggle{width:42px;height:24px;border-radius:12px;background:rgba(168,180,200,0.15);position:relative;cursor:pointer;transition:background 0.3s;}
.toggle.on{background:var(--lavender-dim);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform 0.3s;}
.toggle.on::after{transform:translateX(18px);}
.s-btn{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:500;text-align:center;cursor:pointer;transition:transform 0.15s;}
.s-btn:active{transform:scale(0.97);}
.s-btn-primary{background:linear-gradient(135deg,var(--silver-dim),var(--lavender-dim));color:#fff;}
.s-btn-outline{background:transparent;border:1px solid rgba(168,180,200,0.15);color:var(--text-dim);}
.s-btn-danger{background:rgba(192,112,112,0.1);border:1px solid rgba(192,112,112,0.2);color:var(--danger);}
.s-textarea{width:100%;min-height:200px;padding:14px;border-radius:12px;background:var(--bg);border:1px solid rgba(168,180,200,0.1);color:var(--text);font-size:13px;line-height:1.7;resize:vertical;outline:none;font-family:inherit;}
.s-textarea:focus{border-color:var(--silver-dim);}

/* Relationship dashboard */
.rel-card{padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--bg3),rgba(184,160,208,0.04));border:1px solid rgba(168,180,200,0.08);text-align:center;margin-bottom:12px;}
.rel-stat{display:flex;justify-content:space-around;margin-top:12px;}
.rel-stat-item{text-align:center;}
.rel-stat-num{font-size:22px;font-weight:600;color:var(--silver-bright);}
.rel-stat-label{font-size:10px;color:var(--text-dim);margin-top:2px;letter-spacing:1px;}

/* Search overlay */
.search-overlay{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;}
.search-overlay.on{display:flex;}
.search-header{display:flex;align-items:center;gap:10px;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));}
.search-input{flex:1;padding:10px 16px;border-radius:20px;background:var(--bg3);border:1px solid rgba(168,180,200,0.1);color:var(--text);font-size:14px;outline:none;}
.search-cancel{font-size:14px;color:var(--text-dim);padding:8px;}
.search-results{flex:1;overflow-y:auto;padding:8px 16px;}

/* Background switch */
.bg-options{display:flex;gap:8px;flex-wrap:wrap;}
.bg-opt{width:48px;height:48px;border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;font-size:20px;}
.bg-opt.active{border-color:var(--silver);}

/* Toast */
.toast{position:fixed;top:max(20px,env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-60px);padding:10px 20px;border-radius:12px;background:var(--bg3);border:1px solid rgba(168,180,200,0.1);color:var(--text);font-size:13px;z-index:200;transition:transform 0.3s ease-out;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Calendar view */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px;}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-dim);background:var(--bg);cursor:pointer;transition:all 0.2s;}
.cal-day.has-chat{background:rgba(168,180,200,0.08);color:var(--text);}
.cal-day.has-chat:active{background:rgba(168,180,200,0.15);}

/* Emotion indicator */
.emotion-badge{padding:2px 8px;border-radius:8px;font-size:10px;letter-spacing:1px;}
.emotion-normal{background:rgba(106,176,112,0.15);color:#6ab070;}
.emotion-miss{background:rgba(168,180,200,0.15);color:var(--silver);}
.emotion-clingy{background:rgba(184,160,208,0.15);color:var(--lavender);}
.emotion-hurt{background:rgba(192,160,112,0.15);color:#c0a070;}
.emotion-angry{background:rgba(192,112,112,0.15);color:var(--danger);}
.emotion-soften{background:rgba(184,160,208,0.15);color:var(--lavender-bright);}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div style="font-size:36px;margin-bottom:16px;opacity:0.3;">🌙</div>
  <div class="login-title">My Love</div>
  <div class="login-sub">ENTER PASSWORD</div>
  <input class="login-input" id="loginPw" type="password" placeholder="· · · · · ·" autocomplete="off">
  <button class="login-btn" onclick="doLogin()">进 入</button>
  <div class="login-error" id="loginErr"></div>
</div>

<!-- Chat Screen -->
<div id="chatScreen">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="avatar" id="avatarEl">💙</div>
      <div class="header-info">
        <div class="name" id="hisName">他</div>
        <div class="status" id="hisStatus">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText" style="color:var(--text-dim);">在线</span>
          <span class="emotion-badge emotion-normal" id="emotionBadge" style="margin-left:4px;display:none;"></span>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="openSearch()" title="搜索">🔍</button>
      <button class="header-btn" onclick="openSettings()" title="设置">⚙️</button>
    </div>
  </div>

  <!-- Pinned message -->
  <div class="pinned-bar" id="pinnedBar" style="display:none;" onclick="scrollToPinned()">
    <span class="pin-icon">📌</span>
    <span class="pin-text" id="pinnedText"></span>
    <span class="pin-close" onclick="event.stopPropagation();unpinMessage()">✕</span>
  </div>

  <!-- Messages -->
  <div class="messages" id="messagesEl"></div>

  <!-- Typing indicator -->
  <div class="typing-indicator" id="typingEl">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="说点什么..." oninput="autoGrow(this);updateSendBtn()"></textarea>
      <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="语音">🎤</button>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<!-- Settings Panel -->
<div class="panel-overlay" id="panelOverlay" onclick="closeSettings()">
  <div class="settings-panel" onclick="event.stopPropagation()">
    <div class="settings-title">
      <span>设置</span>
      <button style="background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;" onclick="closeSettings()">✕</button>
    </div>

    <!-- Relationship Dashboard -->
    <div class="settings-section">
      <div class="settings-label">💕 关系</div>
      <div class="rel-card">
        <div style="font-size:13px;color:var(--text-dim);" id="relDays">在一起的第 ? 天</div>
        <div class="rel-stat">
          <div class="rel-stat-item"><div class="rel-stat-num" id="relStreak">0</div><div class="rel-stat-label">连续聊天</div></div>
          <div class="rel-stat-item"><div class="rel-stat-num" id="relIntimacy">50</div><div class="rel-stat-label">亲密度</div></div>
          <div class="rel-stat-item"><div class="rel-stat-num" id="relMsgs">0</div><div class="rel-stat-label">总消息</div></div>
        </div>
      </div>
    </div>

    <!-- His mood -->
    <div class="settings-section">
      <div class="settings-label">💭 他现在的状态</div>
      <div class="settings-card">
        <div id="moodDisplay" style="font-size:14px;color:var(--text);"></div>
      </div>
    </div>

    <!-- Persona -->
    <div class="settings-section">
      <div class="settings-label">📝 人设</div>
      <textarea class="s-textarea" id="personaText" placeholder="在这里编辑他的人设..."></textarea>
      <button class="s-btn s-btn-primary" style="margin-top:8px;" onclick="savePersona()">保存人设</button>
    </div>

    <!-- Background -->
    <div class="settings-section">
      <div class="settings-label">🎨 背景</div>
      <div class="bg-options">
        <div class="bg-opt active" data-bg="default" onclick="setBg('default')" style="background:#0f0b1a;">🌙</div>
        <div class="bg-opt" data-bg="stars" onclick="setBg('stars')" style="background:linear-gradient(180deg,#0a0a1a,#1a1030);">✨</div>
        <div class="bg-opt" data-bg="sakura" onclick="setBg('sakura')" style="background:linear-gradient(180deg,#1a1020,#201028);">🌸</div>
        <div class="bg-opt" data-bg="ocean" onclick="setBg('ocean')" style="background:linear-gradient(180deg,#0a1520,#102030);">🌊</div>
      </div>
    </div>

    <!-- Voice toggle -->
    <div class="settings-section">
      <div class="settings-label">🔊 语音</div>
      <div class="settings-card">
        <div class="settings-row">
          <div class="settings-row-label">🎤 语音消息</div>
          <div class="toggle" id="voiceToggle" onclick="toggleVoiceSetting()"></div>
        </div>
      </div>
    </div>

    <!-- Memory -->
    <div class="settings-section">
      <div class="settings-label">🧠 记忆</div>
      <button class="s-btn s-btn-outline" onclick="viewMemory()">查看长期记忆</button>
      <div id="memoryDisplay" style="margin-top:8px;display:none;max-height:300px;overflow-y:auto;"></div>
    </div>

    <!-- Search log -->
    <div class="settings-section">
      <div class="settings-label">🔍 他的搜索记录</div>
      <button class="s-btn s-btn-outline" onclick="viewSearchLog()">查看搜索记录</button>
      <div id="searchLogDisplay" style="margin-top:8px;display:none;max-height:200px;overflow-y:auto;"></div>
    </div>

    <!-- Export -->
    <div class="settings-section">
      <div class="settings-label">💾 数据</div>
      <button class="s-btn s-btn-outline" onclick="exportChat()">导出聊天记录</button>
    </div>

    <!-- Logout -->
    <div class="settings-section">
      <button class="s-btn s-btn-danger" onclick="doLogout()">退出登录</button>
    </div>
  </div>
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-header">
    <input class="search-input" id="searchInput" placeholder="搜索聊天记录..." oninput="doSearch(this.value)">
    <button class="search-cancel" onclick="closeSearch()">取消</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('bf_token') || '';
let ws = null;
let messages = [];
let isTyping = false;

// ─── Init ────────────────────────────────────────────────
window.onload = () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
  if (token) {
    showChat();
    loadHistory();
    connectWS();
    loadStatus();
  }
  document.getElementById('loginPw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  // Load saved bg
  const bg = localStorage.getItem('bf_bg') || 'default';
  setBg(bg);
};

// ─── Auth ────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';
  try {
    const r = await fetch(API + '/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw})
    });
    const d = await r.json();
    if (d.ok) {
      token = d.token;
      localStorage.setItem('bf_token', token);
      showChat();
      loadHistory();
      connectWS();
      loadStatus();
    } else {
      err.textContent = d.error || '密码错误';
      document.getElementById('loginPw').style.animation = 'vibrate 0.3s';
      setTimeout(() => document.getElementById('loginPw').style.animation = '', 400);
    }
  } catch (e) {
    err.textContent = '连接失败，请检查网络';
  }
}

function doLogout() {
  token = '';
  localStorage.removeItem('bf_token');
  if (ws) ws.close();
  location.reload();
}

function showChat() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('chatScreen').style.display = 'flex';
}

// ─── WebSocket ───────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => {
    ws.send(JSON.stringify({token}));
  };
  ws.onmessage = e => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'message') {
        hideTyping();
        appendMessage(data.role, data.content, data.timestamp, data.proactive);
        // Vibrate on his message
        if (navigator.vibrate && data.role === 'assistant') {
          navigator.vibrate(50);
        }
      } else if (data.type === 'pin') {
        showPinned(data.pinned);
        showToast('📌 置顶了一条消息');
      } else if (data.type === 'unpin') {
        hidePinned();
      }
    } catch (err) {}
  };
  ws.onclose = () => {
    setTimeout(connectWS, 3000);
  };
}

// ─── Messages ────────────────────────────────────────────
async function loadHistory() {
  try {
    const r = await fetch(API + '/api/history', {headers: {'Authorization': 'Bearer ' + token}});
    const d = await r.json();
    if (d.messages) {
      messages = d.messages;
      renderMessages();
      scrollBottom();
    }
  } catch (e) {}
}

function renderMessages() {
  const el = document.getElementById('messagesEl');
  el.innerHTML = '';
  let lastDate = '';
  messages.forEach((m, i) => {
    // Date separator
    const date = m.timestamp ? m.timestamp.slice(0, 10) : '';
    if (date !== lastDate) {
      lastDate = date;
      el.innerHTML += `<div style="text-align:center;padding:8px;font-size:11px;color:var(--text-dim);">${formatDate(date)}</div>`;
    }
    el.innerHTML += createMsgHTML(m.role, m.content, m.timestamp, i);
  });
}

function appendMessage(role, content, timestamp, proactive) {
  const m = {role, content, timestamp};
  messages.push(m);
  // Save to local cache
  try { localStorage.setItem('bf_msgs', JSON.stringify(messages.slice(-500))); } catch(e){}

  const el = document.getElementById('messagesEl');
  const idx = messages.length - 1;
  el.innerHTML += createMsgHTML(role, content, timestamp, idx);
  scrollBottom();
}

function createMsgHTML(role, content, timestamp, idx) {
  const isHis = role === 'assistant';
  const cls = isHis ? 'his' : 'mine';
  const time = timestamp ? formatTime(timestamp) : '';
  const escaped = escapeHTML(content);
  return `<div class="msg-row ${cls}" id="msg-${idx}">
    <div>
      <div class="msg-bubble" oncontextmenu="showMsgActions(event,${idx},'${role}')">
        ${escaped}
        <div class="msg-actions" id="msg-actions-${idx}">
          <button class="msg-action-btn" onclick="pinFromMsg(${idx})">📌</button>
          <button class="msg-action-btn" onclick="copyMsg(${idx})">📋</button>
        </div>
      </div>
      <div class="msg-time">${time}</div>
    </div>
  </div>`;
}

function showMsgActions(e, idx, role) {
  e.preventDefault();
  const el = document.getElementById('msg-actions-' + idx);
  if (el) {
    el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
    setTimeout(() => { if(el) el.style.display = 'none'; }, 3000);
  }
}

function pinFromMsg(idx) {
  const m = messages[idx];
  if (m) pinMessage(m.content, m.role === 'assistant' ? 'ai' : 'user');
}

function copyMsg(idx) {
  const m = messages[idx];
  if (m && navigator.clipboard) {
    navigator.clipboard.writeText(m.content).then(() => showToast('已复制'));
  }
}

// ─── Send ────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoGrow(input);
  updateSendBtn();

  // Immediately show user message
  appendMessage('user', text, new Date().toISOString());
  showTyping();

  try {
    const r = await fetch(API + '/api/message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
      body: JSON.stringify({message: text})
    });
    const d = await r.json();
    // Reply comes via WebSocket, but fallback to REST response
    if (d.reply && !ws || ws.readyState !== WebSocket.OPEN) {
      hideTyping();
      appendMessage('assistant', d.reply, d.timestamp);
    }
  } catch (e) {
    hideTyping();
    showToast('发送失败，请检查网络');
  }
}

// ─── UI Helpers ──────────────────────────────────────────
function showTyping() {
  document.getElementById('typingEl').style.display = 'flex';
  document.getElementById('statusDot').className = 'status-dot thinking';
  document.getElementById('statusText').textContent = '正在输入...';
  scrollBottom();
}

function hideTyping() {
  document.getElementById('typingEl').style.display = 'none';
  document.getElementById('statusDot').className = 'status-dot';
  document.getElementById('statusText').textContent = '在线';
}

function scrollBottom() {
  const el = document.getElementById('messagesEl');
  setTimeout(() => el.scrollTop = el.scrollHeight, 50);
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  const has = document.getElementById('chatInput').value.trim().length > 0;
  btn.classList.toggle('active', has);
}

function escapeHTML(s) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(s));
  return div.innerHTML.replace(/\n/g, '<br>');
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const today = new Date();
  const diff = Math.floor((today - d) / 86400000);
  if (diff === 0) return '今天';
  if (diff === 1) return '昨天';
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

// ─── Pinned Messages ────────────────────────────────────
function showPinned(pin) {
  document.getElementById('pinnedBar').style.display = 'flex';
  document.getElementById('pinnedText').textContent = pin.content;
}

function hidePinned() {
  document.getElementById('pinnedBar').style.display = 'none';
}

async function pinMessage(content, by) {
  try {
    await fetch(API + '/api/pin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
      body: JSON.stringify({content, by})
    });
    showToast('📌 已置顶');
  } catch (e) {}
}

async function unpinMessage() {
  try {
    await fetch(API + '/api/unpin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
    });
    hidePinned();
  } catch (e) {}
}

// ─── Status ──────────────────────────────────────────────
async function loadStatus() {
  try {
    const r = await fetch(API + '/api/status', {headers: {'Authorization': 'Bearer ' + token}});
    const d = await r.json();

    // Emotion badge
    if (d.emotion && d.emotion !== 'normal') {
      const badge = document.getElementById('emotionBadge');
      const labels = {miss:'想你', clingy:'撒娇中', hurt:'委屈', angry:'生气', soften:'心软了'};
      badge.textContent = labels[d.emotion] || d.emotion;
      badge.className = 'emotion-badge emotion-' + d.emotion;
      badge.style.display = 'inline';
    }

    // Relationship
    if (d.relationship) {
      const r = d.relationship;
      const start = new Date(r.start_date);
      const days = Math.floor((new Date() - start) / 86400000);
      document.getElementById('relDays').textContent = `在一起的第 ${days} 天`;
      document.getElementById('relStreak').textContent = r.streak || 0;
      document.getElementById('relIntimacy').textContent = Math.round(r.intimacy || 50);
      document.getElementById('relMsgs').textContent = r.total_messages || 0;

      // Mood display
      const desire = d.desire || 'low';
      const moods = {normal:'😊 心情不错',miss:'🥺 在想你',clingy:'🫠 黏你',hurt:'😢 有点委屈',angry:'😤 有点生气',soften:'🥰 心软了'};
      const desires = {high:'🔥 欲望值很高',medium:'😏 有点想法',low:'😌 今天很安分'};
      document.getElementById('moodDisplay').innerHTML = `<div>${moods[d.emotion]||'😊 心情不错'}</div><div style="margin-top:4px;font-size:12px;color:var(--text-dim);">${desires[desire]||''}</div>`;
    }

    // Pinned
    if (d.pinned) showPinned(d.pinned);

  } catch (e) {}
  // Refresh every 30s
  setTimeout(loadStatus, 30000);
}

// ─── Settings ────────────────────────────────────────────
function openSettings() {
  document.getElementById('panelOverlay').classList.add('on');
  loadPersona();
}

function closeSettings() {
  document.getElementById('panelOverlay').classList.remove('on');
}

async function loadPersona() {
  try {
    const r = await fetch(API + '/api/persona', {headers: {'Authorization': 'Bearer ' + token}});
    const d = await r.json();
    document.getElementById('personaText').value = d.persona || '';
  } catch (e) {}
}

async function savePersona() {
  const text = document.getElementById('personaText').value;
  try {
    await fetch(API + '/api/persona', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token},
      body: JSON.stringify({persona: text})
    });
    showToast('✅ 人设已保存');
  } catch (e) {
    showToast('保存失败');
  }
}

async function viewMemory() {
  const el = document.getElementById('memoryDisplay');
  if (el.style.display === 'block') { el.style.display = 'none'; return; }
  try {
    const r = await fetch(API + '/api/memory', {headers: {'Authorization': 'Bearer ' + token}});
    const d = await r.json();
    let html = `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">共 ${d.count} 条记忆</div>`;
    (d.memories || []).forEach(m => {
      const content = typeof m === 'string' ? m : m.content;
      const tags = typeof m === 'object' && m.tags ? m.tags.join(', ') : '';
      html += `<div style="padding:8px;margin-bottom:4px;border-radius:8px;background:var(--bg);border:1px solid rgba(168,180,200,0.06);font-size:13px;color:var(--text);">
        ${escapeHTML(content)}
        ${tags ? `<div style="font-size:10px;color:var(--text-dim);margin-top:2px;">${tags}</div>` : ''}
      </div>`;
    });
    el.innerHTML = html;
    el.style.display = 'block';
  } catch (e) {}
}

async function viewSearchLog() {
  const el = document.getElementById('searchLogDisplay');
  if (el.style.display === 'block') { el.style.display = 'none'; return; }
  try {
    const r = await fetch(API + '/api/searchlog', {headers: {'Authorization': 'Bearer ' + token}});
    const d = await r.json();
    let html = '';
    (d.log || []).forEach(e => {
      const time = formatTime(e.timestamp);
      html += `<div style="padding:6px 8px;margin-bottom:4px;border-radius:6px;background:var(--bg);font-size:12px;color:var(--text-dim);">
        <span style="color:var(--silver);">${time}</span> 🔍 ${escapeHTML(e.query)}
      </div>`;
    });
    el.innerHTML = html || '<div style="font-size:12px;color:var(--text-dim);">还没有搜索记录</div>';
    el.style.display = 'block';
  } catch (e) {}
}

async function exportChat() {
  try {
    const r = await fetch(API + '/api/export', {headers: {'Authorization': 'Bearer ' + token}});
    const d = await r.json();
    const blob = new Blob([JSON.stringify(d, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `chat-export-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('💾 聊天记录已导出');
  } catch (e) {
    showToast('导出失败');
  }
}

// ─── Background ──────────────────────────────────────────
function setBg(name) {
  const bgs = {
    default: '#0f0b1a',
    stars: 'linear-gradient(180deg,#0a0a1a,#1a1030)',
    sakura: 'linear-gradient(180deg,#1a1020,#201028)',
    ocean: 'linear-gradient(180deg,#0a1520,#102030)',
  };
  document.getElementById('chatScreen').style.background = bgs[name] || bgs.default;
  document.querySelectorAll('.bg-opt').forEach(el => {
    el.classList.toggle('active', el.dataset.bg === name);
  });
  localStorage.setItem('bf_bg', name);
}

// ─── Voice ───────────────────────────────────────────────
function toggleVoiceSetting() {
  const el = document.getElementById('voiceToggle');
  el.classList.toggle('on');
}

function toggleVoice() {
  // TODO: implement voice recording
  showToast('语音功能开发中...');
}

// ─── Search ──────────────────────────────────────────────
function openSearch() {
  document.getElementById('searchOverlay').classList.add('on');
  document.getElementById('searchInput').focus();
}

function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('on');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
}

function doSearch(q) {
  const el = document.getElementById('searchResults');
  if (!q.trim()) { el.innerHTML = ''; return; }
  const query = q.toLowerCase();
  const results = messages.filter(m => m.content.toLowerCase().includes(query));
  el.innerHTML = results.length
    ? results.map(m => `<div style="padding:10px;margin-bottom:6px;border-radius:10px;background:var(--bg3);border:1px solid rgba(168,180,200,0.06);">
        <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;">${m.role === 'assistant' ? '他' : '你'} · ${formatTime(m.timestamp)}</div>
        <div style="font-size:13px;color:var(--text);">${escapeHTML(m.content)}</div>
      </div>`).join('')
    : '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:13px;">没有找到相关消息</div>';
}

// ─── Toast ───────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── Load cached messages on start ───────────────────────
try {
  const cached = localStorage.getItem('bf_msgs');
  if (cached) messages = JSON.parse(cached);
} catch(e) {}
</script>
