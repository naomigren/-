<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="克拉拉养成">
<title>克拉拉养成计划</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:linear-gradient(160deg,#fdf2f0 0%,#f5e6e0 40%,#f0e0da 100%);color:#5a4a4a;font-family:'Noto Sans SC','Segoe UI',sans-serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;border:none;background:none;font-family:inherit;-webkit-tap-highlight-color:transparent;}
textarea,input{font-family:inherit;-webkit-appearance:none;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(219,147,158,0.3);border-radius:4px;}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes sparkle{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(219,147,158,0.3);}50%{box-shadow:0 0 40px rgba(219,147,158,0.5);}}
.bg1{position:fixed;top:-20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(219,147,158,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.bg2{position:fixed;bottom:-10%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(199,163,163,0.06) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:14px 24px;border-radius:14px;z-index:1000;font-size:15px;font-weight:600;max-width:90vw;text-align:center;color:white;box-shadow:0 8px 32px rgba(255,255,255,0.7);animation:slideDown 0.3s ease-out;}
.toast-earn{background:linear-gradient(135deg,#7ba889,#6b9a7a);}.toast-big{background:linear-gradient(135deg,#c4868e,#d4a0a0);}.toast-redeem{background:linear-gradient(135deg,#c9a878,#d4b888);}.toast-penalty{background:linear-gradient(135deg,#c07070,#d48888);}.toast-fail{background:linear-gradient(135deg,#374151,#4b5563);}.toast-card{background:linear-gradient(135deg,#8a7a9a,#a08aaa);}
.inp{width:100%;padding:8px 12px;border-radius:8px;font-size:14px;background:rgba(255,255,255,0.6);color:#5a4a4a;border:1px solid rgba(219,147,158,0.2);outline:none;box-sizing:border-box;}
.tab-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;transition:all 0.2s ease;}
.tab-active{font-weight:600;color:#fff;background:linear-gradient(135deg,rgba(219,147,158,0.3),rgba(199,163,163,0.2));}
.tab-inactive{font-weight:400;color:#a08888;background:transparent;}
.task-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 14px;border-radius:10px;color:#5a4a4a;border:1px solid rgba(219,147,158,0.2);background:rgba(255,255,255,0.5);}
.task-btn-big{background:linear-gradient(135deg,rgba(219,147,158,0.12),rgba(199,163,163,0.08));border:1px solid rgba(219,147,158,0.25);}
.pen-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:12px 14px;background:rgba(210,140,140,0.06);border-radius:10px;border:1px solid rgba(210,140,140,0.15);color:#c08888;}
.pts{font-size:13px;font-weight:700;font-family:'Outfit';white-space:nowrap;margin-left:8px;}
.section-title{font-size:15px;font-weight:600;margin-bottom:10px;}
.hidden{display:none;}
@keyframes achieveSlideIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}60%{transform:translate(-50%,-50%) scale(1.05);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
@keyframes achieveGlow{0%,100%{box-shadow:0 0 30px rgba(196,134,142,0.4);}50%{box-shadow:0 0 60px rgba(196,134,142,0.7);}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
@keyframes epicFlash{0%{opacity:0;}15%{opacity:0.3;}30%{opacity:0;}100%{opacity:0;}}
@keyframes shakeIt{0%,100%{transform:translateX(0);}25%,75%{transform:translateX(-3px);}50%{transform:translateX(3px);}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 8px rgba(163,176,196,0.3);}50%{box-shadow:0 0 16px rgba(163,176,196,0.5);}}
.achieve-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2000;display:flex;align-items:center;justify-content:center;}
.achieve-overlay-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);}
.achieve-card{position:relative;z-index:2001;width:85vw;max-width:340px;border-radius:20px;padding:28px 24px;text-align:center;animation:achieveSlideIn 0.5s ease-out;}
.achieve-card-normal{background:linear-gradient(145deg,#e8edf3,#d5dce6);border:2px solid #a3b0c4;box-shadow:0 8px 32px rgba(163,176,196,0.4);}
.achieve-card-rare{background:linear-gradient(145deg,#e8e8ef,#d8d8e2);border:2px solid #a8a8b8;box-shadow:0 8px 32px rgba(168,168,184,0.4);animation:achieveSlideIn 0.5s ease-out,pulseGlow 2s ease-in-out infinite;}
.achieve-card-epic{background:linear-gradient(145deg,#faf5eb,#f0e8d8);border:2px solid #d4a840;box-shadow:0 8px 32px rgba(212,168,64,0.4);animation:achieveSlideIn 0.5s ease-out,achieveGlow 2s ease-in-out infinite;}
.achieve-card-legend{background:linear-gradient(145deg,#f5ede8,#efe4de);border:2px solid transparent;box-shadow:0 12px 48px rgba(196,134,142,0.5);animation:achieveSlideIn 0.5s ease-out;}
.confetti-piece{position:fixed;top:-10px;z-index:2002;pointer-events:none;animation:confettiFall linear forwards;}
.epic-flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1999;pointer-events:none;animation:epicFlash 0.6s ease-out forwards;}
@keyframes legendLockedPulse{0%,100%{border-color:rgba(196,134,142,0.2);box-shadow:0 0 12px rgba(196,134,142,0.08);}50%{border-color:rgba(196,134,142,0.45);box-shadow:0 0 20px rgba(196,134,142,0.15);}}
@keyframes epicLockedShimmer{0%,100%{border-color:rgba(212,168,64,0.15);box-shadow:0 0 8px rgba(212,168,64,0.05);}50%{border-color:rgba(212,168,64,0.35);box-shadow:0 0 14px rgba(212,168,64,0.1);}}
@keyframes rareLockedGlow{0%,100%{border-color:rgba(168,168,184,0.15);}50%{border-color:rgba(168,168,184,0.3);}}
.ach-wall-card{padding:14px 16px;border-radius:14px;margin-bottom:10px;position:relative;overflow:hidden;}
.ach-locked-normal{background:linear-gradient(135deg,rgba(163,176,196,0.06),rgba(163,176,196,0.02));border:1px dashed rgba(163,176,196,0.25);}
.ach-locked-rare{background:linear-gradient(135deg,rgba(168,168,184,0.08),rgba(168,168,184,0.03));border:1px dashed rgba(168,168,184,0.25);animation:rareLockedGlow 3s ease-in-out infinite;}
.ach-locked-epic{background:linear-gradient(135deg,rgba(212,168,64,0.06),rgba(212,168,64,0.02));border:1px dashed rgba(212,168,64,0.2);animation:epicLockedShimmer 3s ease-in-out infinite;}
.ach-locked-legend{background:linear-gradient(135deg,rgba(196,134,142,0.08),rgba(199,163,163,0.04));border:1.5px dashed rgba(196,134,142,0.25);animation:legendLockedPulse 3s ease-in-out infinite;}
.ach-unlocked-normal{background:linear-gradient(135deg,rgba(163,176,196,0.12),rgba(163,176,196,0.06));border:1px solid rgba(163,176,196,0.3);}
.ach-unlocked-rare{background:linear-gradient(135deg,rgba(168,168,184,0.12),rgba(168,168,184,0.06));border:1px solid rgba(168,168,184,0.3);}
.ach-unlocked-epic{background:linear-gradient(135deg,rgba(212,168,64,0.1),rgba(212,168,64,0.04));border:1px solid rgba(212,168,64,0.3);}
.ach-unlocked-legend{background:linear-gradient(135deg,rgba(196,134,142,0.12),rgba(199,163,163,0.06));border:1px solid rgba(196,134,142,0.3);animation:glow 3s ease-in-out infinite;}

/* ═══════ CARD FRAGMENT SYSTEM ═══════ */
.card-carousel-wrap{position:relative;margin:0 0 20px;overflow:hidden;}
.card-carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:14px;padding:0 8px;}
.card-carousel::-webkit-scrollbar{display:none;}
.card-slot{flex:0 0 82vw;max-width:360px;scroll-snap-align:center;border-radius:16px;overflow:hidden;position:relative;background:#3a3035;box-shadow:0 6px 24px rgba(80,60,68,0.22);}
@keyframes cardGlow{0%,100%{box-shadow:0 6px 24px rgba(212,180,140,0.25);}50%{box-shadow:0 8px 32px rgba(212,180,140,0.45);}}
.card-slot-done{border:2px solid rgba(212,180,140,0.5);animation:cardGlow 3s ease-in-out infinite;}
.card-img-wrap{position:relative;width:100%;padding-top:133%;overflow:hidden;}
.card-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
.card-mask{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.card-piece{position:absolute;background:rgba(55,45,50,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:opacity 0.8s ease;border:0.5px solid rgba(100,85,90,0.18);}
.card-piece.unlocked{opacity:0;backdrop-filter:none;-webkit-backdrop-filter:none;}
.card-info{padding:10px 14px;text-align:center;background:rgba(50,40,45,0.55);}
.card-info-name{font-size:14px;font-weight:600;color:rgba(230,215,210,0.88);letter-spacing:1px;margin-bottom:2px;}
.card-info-line{font-size:11px;color:rgba(199,170,165,0.6);margin-bottom:4px;}
.card-info-prog{font-family:'Outfit';font-size:13px;font-weight:700;color:rgba(219,180,175,0.85);}
.card-dots{display:flex;justify-content:center;gap:6px;padding:8px 0 2px;}
.card-dot{width:7px;height:7px;border-radius:50%;background:rgba(219,147,158,0.2);transition:all 0.3s;}
.card-dot.active{background:rgba(219,147,158,0.55);transform:scale(1.25);}
.card-lock{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;opacity:0.35;z-index:5;transition:opacity 0.5s;pointer-events:none;}
.card-lock.hide{opacity:0;}
.card-reveal-ov{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background 0.5s;pointer-events:none;opacity:0;}
.card-reveal-ov.on{background:rgba(20,15,18,0.88);pointer-events:all;opacity:1;}
.card-reveal-box{position:relative;width:78vw;max-width:340px;border-radius:16px;overflow:hidden;box-shadow:0 12px 60px rgba(196,134,142,0.35);transform:scale(0.8);transition:transform 0.8s cubic-bezier(0.16,1,0.3,1);opacity:0;}
.card-reveal-ov.on .card-reveal-box{transform:scale(1);opacity:1;}
.card-reveal-img{width:100%;display:block;filter:blur(20px);transition:filter 2s ease;}
.card-reveal-img.clear{filter:blur(0);}
.card-reveal-cap{position:absolute;bottom:0;left:0;right:0;padding:20px;text-align:center;background:linear-gradient(transparent,rgba(20,15,18,0.8));opacity:0;transition:opacity 1s ease 1.5s;}
.card-reveal-ov.on .card-reveal-cap{opacity:1;}
</style>
</head>
<body>
<div class="bg1"></div><div class="bg2"></div>
<div id="toast" class="toast hidden"></div>
<div id="achieveOverlay"></div>
<div id="confettiContainer"></div>
<div id="cardRevealOv" class="card-reveal-ov" onclick="closeCardReveal()">
  <div class="card-reveal-box" onclick="event.stopPropagation()">
    <img id="crImg" class="card-reveal-img" src="" alt="">
    <div class="card-reveal-cap">
      <div id="crName" style="font-family:'Outfit';font-size:20px;font-weight:700;color:rgba(230,215,210,0.95);letter-spacing:2px;margin-bottom:4px;"></div>
      <div id="crSub" style="font-size:12px;color:rgba(219,180,175,0.7);"></div>
    </div>
  </div>
</div>

<div style="padding:28px 20px 12px;text-align:center;">
  <div style="font-family:'Outfit',sans-serif;font-size:13px;letter-spacing:4px;text-transform:uppercase;color:#c4868e;margin-bottom:6px;">✦ KLARA'S LIFE QUEST ✦</div>
  <h1 style="font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(135deg,#d4a0a0 0%,#d4a0a0 50%,#c9b8a8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;">克拉拉养成计划</h1>
  <div style="font-size:12px;color:#a08888;">2026 春季学期 · 最后一战</div>
  <div style="display:flex;justify-content:center;gap:10px;margin-top:12px;">
    <button onclick="toggleSave()" style="padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;background:linear-gradient(135deg,#c4868e,#b07078);color:#fff;">💾 备份存档</button>
    <button onclick="toggleLoad()" style="padding:6px 16px;border-radius:8px;font-size:12px;font-weight:600;background:rgba(219,147,158,0.12);color:#8a6a6e;border:1px solid rgba(219,147,158,0.2);">📂 导入存档</button>
  </div>
  <div id="savePanel" class="hidden" style="margin-top:12px;padding:12px;background:rgba(255,255,255,0.6);border-radius:12px;border:1px solid rgba(219,147,158,0.2);">
    <div style="font-size:12px;color:#c4868e;margin-bottom:8px;">长按下方存档码全选复制：</div>
    <textarea id="saveCode" readonly onfocus="this.select()" style="width:100%;height:60px;font-size:11px;background:rgba(255,255,255,0.7);color:#6a5555;border:1px solid rgba(219,147,158,0.2);border-radius:8px;padding:8px;resize:none;word-break:break-all;"></textarea>
    <button onclick="copyCode()" style="margin-top:8px;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;background:linear-gradient(135deg,#c4868e,#d4a0a0);color:#fff;">复制存档码</button>
  </div>
  <div id="loadPanel" class="hidden" style="margin-top:12px;padding:12px;background:rgba(255,255,255,0.6);border-radius:12px;border:1px solid rgba(219,147,158,0.2);">
    <div style="font-size:12px;color:#c4868e;margin-bottom:8px;">粘贴存档码到下方：</div>
    <textarea id="loadCode" placeholder="在这里粘贴存档码..." style="width:100%;height:60px;font-size:11px;background:rgba(255,255,255,0.7);color:#6a5555;border:1px solid rgba(219,147,158,0.2);border-radius:8px;padding:8px;resize:none;word-break:break-all;"></textarea>
    <button onclick="loadSave()" style="margin-top:8px;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;background:linear-gradient(135deg,#047857,#065f46);color:#fff;">读取存档</button>
    <div id="loadMsg" style="font-size:12px;margin-top:6px;"></div>
  </div>
</div>

<div style="display:flex;justify-content:center;gap:16px;padding:12px 20px 16px;">
  <div id="cpBox" style="flex:1;max-width:180px;background:linear-gradient(135deg,rgba(219,147,158,0.15),rgba(199,163,163,0.1));border-radius:16px;padding:16px;text-align:center;border:1px solid rgba(219,147,158,0.2);">
    <div style="font-size:11px;color:#c4868e;letter-spacing:1px;margin-bottom:4px;">可用积分</div>
    <div id="cpVal" style="font-family:'Outfit',sans-serif;font-size:36px;font-weight:800;background:linear-gradient(135deg,#d4a0a0,#e8b4b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">0</div>
  </div>
  <div style="flex:1;max-width:180px;background:rgba(255,255,255,0.5);border-radius:16px;padding:16px;text-align:center;border:1px solid rgba(219,147,158,0.15);">
    <div style="font-size:11px;color:#a08888;letter-spacing:1px;margin-bottom:4px;">累计总分</div>
    <div id="tpVal" style="font-family:'Outfit',sans-serif;font-size:36px;font-weight:800;color:#6a5555;">0</div>
  </div>
</div>

<div style="margin:0 20px 20px;background:rgba(255,255,255,0.5);border-radius:12px;padding:12px 16px;border:1px solid rgba(219,147,158,0.2);">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:12px;color:#a08888;">✈️ 日本旅行进度</span>
    <span id="japanText" style="font-size:12px;color:#c4868e;font-family:'Outfit';">0/2000</span>
  </div>
  <div style="height:6px;border-radius:3px;background:rgba(219,147,158,0.15);overflow:hidden;">
    <div id="japanBar" style="height:100%;border-radius:3px;width:0%;background:linear-gradient(90deg,#c4868e,#d4a0a0,#c9b8a8);transition:width 0.5s ease;"></div>
  </div>
</div>

<div style="margin:0 20px 20px;background:rgba(255,255,255,0.5);border-radius:12px;padding:12px 16px;border:1px solid rgba(219,147,158,0.2);">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="font-size:12px;color:#a08888;">🇩🇪 德国之路（高财+德语）</span>
    <span id="deText" style="font-size:12px;color:#c4868e;font-family:'Outfit';">0/2000</span>
  </div>
  <div style="height:6px;border-radius:3px;background:rgba(219,147,158,0.15);overflow:hidden;">
    <div id="deBar" style="height:100%;border-radius:3px;width:0%;background:linear-gradient(90deg,#c9b8a8,#b07078,#c4868e);transition:width 0.5s ease;"></div>
  </div>
</div>

<div style="display:flex;margin:0 20px 16px;background:rgba(255,255,255,0.5);border-radius:12px;padding:3px;">
  <button class="tab-btn tab-active" onclick="switchTab('tasks')" id="tab-tasks">📋 任务</button>
  <button class="tab-btn tab-inactive" onclick="switchTab('attrs')" id="tab-attrs">💎 属性</button>
  <button class="tab-btn tab-inactive" onclick="switchTab('achieve')" id="tab-achieve">🏆 成就</button>
  <button class="tab-btn tab-inactive" onclick="switchTab('shop')" id="tab-shop">🎁 商城</button>
  <button class="tab-btn tab-inactive" onclick="switchTab('history')" id="tab-history">📜 记录</button>
</div>

<div style="padding:0 20px 100px;">
  <div id="content-tasks"></div>
  <div id="content-attrs" class="hidden"></div>
  <div id="content-achieve" class="hidden"></div>
  <div id="content-shop" class="hidden"></div>
  <div id="content-history" class="hidden"></div>
</div>

let _cardFragQ=[];
function checkCardFragments(){
  const conds=getFragConds();
  let changed=false;
  CARD_DEFS.forEach(cd=>{
    const arr=S.cards[cd.id];
    const c=conds[cd.id];
    c.forEach((met,i)=>{
      if(met && !arr[i]){
        arr[i]=true; changed=true;
        const done=arr.filter(Boolean).length;
        if(done===cd.total){
          _cardFragQ.push({type:'full',card:cd});
        } else {
          _cardFragQ.push({type:'frag',card:cd,idx:done,total:cd.total});
        }
      }
    });
  });
  if(changed){saveState();if(currentTab==='achieve')renderAchieve();}
  if(_cardFragQ.length){processCardQ();}
}
function processCardQ(){
  if(!_cardFragQ.length)return;
  const ev=_cardFragQ.shift();
  if(ev.type==='frag'){
    flash('✨ 「'+ev.card.name+'」碎片 '+ev.idx+'/'+ev.total+' 已揭示','card');
    setTimeout(processCardQ,1200);

    showCardReveal(ev.card);

}

  if(a.r==="normal"){spawnConfetti(20,["#a3b0c4","#c4d0e0","#8a9bb5"]);document.body.style.animation="shakeIt 0.3s ease";setTimeout(()=>document.body.style.animation="",400);}
  else if(a.r==="rare"){spawnConfetti(50,["#a8a8b8","#c8c8d8","#d8d8e8"]);}
  else if(a.r==="epic"){spawnConfetti(100,["#d4a840","#e8c860","#c49830","#f0d878"]);const f=document.createElement("div");f.className="epic-flash";f.style.background="#d4a840";document.body.appendChild(f);setTimeout(()=>f.remove(),700);}
  else{spawnConfetti(150,["#c4868e","#d4a0a0","#c9b8a8","#a3b0c4","#d4a840"]);const f=document.createElement("div");f.className="epic-flash";f.style.background="linear-gradient(135deg,#c4868e,#d4a0a0)";document.body.appendChild(f);setTimeout(()=>f.remove(),700);}
  const pc=a.r==="legend"?"#c4868e":a.r==="epic"?"#d4a840":a.r==="rare"?"#a8a8b8":"#a3b0c4";
  o.innerHTML=`<div class="achieve-overlay" onclick="closeAch()"><div class="achieve-overlay-bg"></div><div class="achieve-card ${r.cc}" onclick="event.stopPropagation()"><div style="font-size:20px;letter-spacing:4px;margin-bottom:8px;">${r.stars}</div><div style="font-size:11px;letter-spacing:2px;color:${r.color};margin-bottom:8px;">${r.label}成就</div><div style="font-family:'Outfit';font-size:20px;font-weight:700;color:#5a4a4a;margin-bottom:12px;">「${a.name}」</div><div style="font-size:14px;line-height:1.7;color:#6a5a5a;margin-bottom:16px;">${a.msg}</div><div style="font-family:'Outfit';font-size:24px;font-weight:800;color:${pc};margin-bottom:16px;">+${a.pts}</div><button onclick="closeAch()" style="padding:10px 28px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(135deg,#c4868e,#d4a0a0);">收下</button></div></div>`;
}
function closeAch(){document.getElementById("achieveOverlay").innerHTML="";if(_achQ.length)setTimeout(()=>showAchPopup(_achQ.shift()),400);}
let _achQ=[];
/* ═══════ CHECK ACHIEVEMENTS ═══════ */
function checkAchievements(){
  const t=tList(),hr=new Date().getHours(),td=todayStr(),yd=yesterdayStr();const unlocked=[];
  function tryU(id){if(S.ach[id])return;const a=ACHS.find(x=>x.id===id);if(!a)return;S.ach[id]={d:new Date().toISOString()};S.cp+=a.pts;S.tp+=a.pts;if(a.at)applyAttrs(a.at);S.h.unshift({t:"a",n:"🏆 "+a.name,p:a.pts,d:new Date().toISOString()});unlocked.push(a);}
  if(S.h.length>0)tryU("a01");
  if(hr>=0&&hr<5&&t.length>0)tryU("a02");
  if(t.includes("bath")&&t.includes("brush")&&t.includes("skincare")&&t.includes("undies_today")&&t.includes("socks_today"))tryU("a03");
  if(hasPenToday("pn_takeout")&&t.includes("cook"))tryU("a04");
  if(penStrk()>=3)tryU("a05");
  if(t.includes("cook")&&t.includes("dishes_today")&&t.includes("tidy")&&t.includes("mop"))tryU("a06");
  if(t.includes("vitamin")&&t.includes("foot_soak")&&t.includes("early_sleep")&&t.includes("water")&&t.includes("bowel"))tryU("a07");
  if((S.dailyPens[yd]||[]).includes("pn_late_sleep")&&t.includes("wake")&&(t.includes("exercise")||t.includes("badminton")||t.includes("run")))tryU("a08");
  if(taskStrk("water")>=14)tryU("a09");
  if(multiStrk(["no_sugar","no_snack"],10)>=10)tryU("a10");
  if(t.includes("gc_attend")&&t.includes("gc_review")&&t.includes("gc_homework"))tryU("a11");
  if(cnt("gc_mock")>=10)tryU("a12");
  if(taskStrk("gc_mock")>=3)tryU("a13");
  if(taskStrk("de_grammar")>=7)tryU("a14");
  if(["de_vocab","de_grammar","de_friends","de_speak"].some(id=>t.includes(id))&&["gc_attend","gc_review","gc_homework","gc_mock"].some(id=>t.includes(id)))tryU("a15");
  if((t.includes("badminton")||t.includes("exercise"))&&t.includes("run")&&t.includes("stretch"))tryU("a16");
  if(taskStrk("diet_meal")>=7)tryU("a17");
  if(cnt("say_no")>=5)tryU("a18");
  if(t.includes("piano")&&t.includes("sing")&&t.includes("dance_t"))tryU("a19");
  if((S.dailyPts[td]||0)>=100)tryU("a20");
  const fd=firstDate();if(fd&&daysBetween(fd.slice(0,10),td)>=30)tryU("a21");
  if(multiStrk(["early_sleep","wake"],14)>=14)tryU("a22");
  if(taskStrk("no_takeout")>=21)tryU("a23");
  if(choreStrk()>=7)tryU("a24");
  if(t.includes("gc_attend")&&t.includes("gc_review")&&t.includes("gc_homework")&&t.includes("gc_mock"))tryU("a25");
  if(cntFear()>=5)tryU("a26");
  if(t.includes("gc_mock")&&t.includes("de_vocab")&&t.includes("de_grammar")&&(t.includes("exercise")||t.includes("badminton")||t.includes("run")))tryU("a27");
  if(t.includes("de_vocab")&&t.includes("de_grammar")&&t.includes("de_friends")&&t.includes("de_speak"))tryU("a28");
  if(taskStrk("de_vocab")>=14)tryU("a29");
  if(cnt("de_speak")>=30)tryU("a30");
  if(grpStrk(["exercise","badminton","run","dance_t","stretch"],7)>=7)tryU("a31");
  if(multiStrk(["no_sugar","no_snack","water"],14)>=14)tryU("a32");
  if(t.includes("exercise")&&t.includes("early_sleep")&&t.includes("diet_meal")&&t.includes("water")&&t.includes("no_sugar"))tryU("a33");
  if(cnt("say_no")>=15)tryU("a34");
  if(cnt("face_fear")>=10)tryU("a35");
  if(t.includes("say_no")&&t.includes("face_fear")&&t.includes("social_out")&&t.includes("contact_teacher"))tryU("a36");
  if(cnt("reading")>=30)tryU("a37");
  if((S.attrs.grace||0)>=180)tryU("a38");
  if(fd&&daysBetween(fd.slice(0,10),td)>=100)tryU("a39");
  if(cnt("gc_pass")>0)tryU("a40");
  if(cnt("dr_ke1")>0&&cnt("dr_ke2")>0&&cnt("dr_ke3")>0&&cnt("dr_ke4")>0)tryU("a41");
  if(cnt("de_level")>0&&cnt("gc_pass")>0)tryU("a42");
  if(grpStrk(["exercise","badminton","run","dance_t","diet_meal","no_sugar"],30)>=30)tryU("a43");
  if(ATTRS.every(a=>(S.attrs[a.id]||0)>=50))tryU("a44");
  if(ATTRS.filter(a=>(S.attrs[a.id]||0)>=300).length>=5)tryU("a45");
  if(S.tp>=5000)tryU("a46");
  if(unlocked.length){saveState();render();_achQ.push(...unlocked);if(_achQ.length===unlocked.length)showAchPopup(_achQ.shift());}
}
/* ═══════ RENDER ACHIEVEMENTS + CARD CAROUSEL ═══════ */
function renderCardCarousel(){
  let h='<div class="card-carousel-wrap"><div class="card-carousel" id="cardCarousel">';
  CARD_DEFS.forEach(cd=>{
    const arr=S.cards[cd.id]||[];const done=arr.filter(Boolean).length;const full=done===cd.total;
    h+=`<div class="card-slot${full?" card-slot-done":""}"><div class="card-img-wrap"><img class="card-img" src="${cd.img}" alt="${cd.name}" loading="lazy"><div class="card-mask">`;
    cd.frags.forEach((f,i)=>{h+=`<div class="card-piece${arr[i]?" unlocked":""}" style="top:${f.region.top};left:${f.region.left};width:${f.region.width};height:${f.region.height};"></div>`;});
    h+=`</div><div class="card-lock${done>0?" hide":""}">🔒</div></div><div class="card-info"><div class="card-info-name">${cd.name}</div><div class="card-info-line">${cd.line}</div><div class="card-info-prog">${done} / ${cd.total}</div></div></div>`;
  });
  h+='</div><div class="card-dots" id="cardDots">';
  CARD_DEFS.forEach((_,i)=>{h+=`<div class="card-dot${i===0?" active":""}"></div>`;});
  h+='</div></div>';return h;
}
function initCarouselDots(){
  const c=document.getElementById('cardCarousel');if(!c)return;
  const dots=document.querySelectorAll('#cardDots .card-dot');
  c.addEventListener('scroll',()=>{const sw=c.scrollWidth-c.clientWidth;const pct=sw>0?c.scrollLeft/sw:0;const idx=Math.round(pct*(CARD_DEFS.length-1));dots.forEach((d,i)=>d.classList.toggle('active',i===idx));});
}
function renderAchieve(){
  const total=ACHS.length,unlocked=Object.keys(S.ach).length;
  let h=`<div style="text-align:center;margin-bottom:20px;"><div style="font-family:'Outfit';font-size:13px;color:#a08888;margin-bottom:8px;">成就进度</div><div style="font-family:'Outfit';font-size:32px;font-weight:800;color:#5a4a4a;">${unlocked}<span style="font-size:16px;color:#b09898;">/${total}</span></div><div style="height:6px;border-radius:3px;background:rgba(219,147,158,0.15);overflow:hidden;margin:12px 20px 0;"><div style="height:100%;border-radius:3px;width:${unlocked/total*100}%;background:linear-gradient(90deg,#a3b0c4,#c4868e,#d4a840);transition:width 0.5s ease;"></div></div></div>`;
  h+=renderCardCarousel();
  const cats=["生活","学业","德语","身心","恶女","成长","彩蛋"];const ro=["legend","epic","rare","normal"];
  cats.forEach(cat=>{const ca=ACHS.filter(a=>a.cat===cat);if(!ca.length)return;const cu=ca.filter(a=>S.ach[a.id]).length;
  h+=`<div style="margin-bottom:20px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div class="section-title" style="color:#8a6a6e;">${cat}</div><div style="font-size:12px;color:#b09898;font-family:'Outfit';">${cu}/${ca.length}</div></div>`;
  const sorted=[...ca].sort((a,b)=>{const aU=S.ach[a.id]?1:0,bU=S.ach[b.id]?1:0;if(aU!==bU)return bU-aU;return ro.indexOf(a.r)-ro.indexOf(b.r);});
  sorted.forEach(a=>{const r=ACH_R[a.r];if(S.ach[a.id]){const d=fmtDate(S.ach[a.id].d);h+=`<div class="ach-wall-card ${r.wc}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><div style="font-size:14px;font-weight:600;color:#5a4a4a;">「${a.name}」</div><div style="font-size:11px;color:${r.color};font-family:'Outfit';font-weight:600;">${r.stars}</div></div><div style="font-size:12px;color:#8a7a7a;line-height:1.6;margin-bottom:6px;">${a.msg}</div><div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;color:#b09898;">${d}</span><span style="font-size:12px;font-weight:700;font-family:'Outfit';color:${r.color};">+${a.pts}</span></div></div>`;}else{h+=`<div class="ach-wall-card ach-locked-${a.r}"><div style="display:flex;justify-content:space-between;align-items:center;"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:18px;opacity:${a.r==='legend'?0.5:a.r==='epic'?0.4:0.25};">🔒</span><span style="font-size:13px;color:${a.r==='legend'?'rgba(196,134,142,0.5)':a.r==='epic'?'rgba(212,168,64,0.45)':a.r==='rare'?'rgba(168,168,184,0.45)':'rgba(163,176,196,0.4)'};">${a.r==='legend'?'— ? ? ? —':a.r==='epic'?'· · ·':'???'}</span></div><div style="font-size:11px;color:${a.r==='legend'?'rgba(196,134,142,0.5)':a.r==='epic'?'rgba(212,168,64,0.45)':a.r==='rare'?'rgba(168,168,184,0.45)':'rgba(163,176,196,0.4)'};font-family:'Outfit';">${r.stars}</div></div></div>`;}});
  h+=`</div>`;});
  document.getElementById("content-achieve").innerHTML=h;
  setTimeout(initCarouselDots,50);
}
/* ═══════ INIT ═══════ */
loadState();render();setTimeout(checkCardFragments,500);
