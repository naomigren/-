<div style="font-size:12px;color:#c4868e;margin-bottom:4px;">完成褒奖</div><input id="ct_pr" class="inp" placeholder="比如：好棒！"></div><button onclick="addCT()" style="width:100%;padding:10px;border-radius:8px;font-size:14px;font-weight:600;background:linear-gradient(135deg,#c4868e,#d4a0a0);color:#fff;">确认添加</button></div>`;if(S.ct.length){h+=`<div style="display:flex;flex-direction:column;gap:6px;">`;S.ct.forEach(t=>{h+=`<div style="display:flex;align-items:center;width:100%;padding:12px 14px;background:rgba(219,147,158,0.06);border-radius:10px;border:1px solid rgba(219,147,158,0.15);"><button onclick="doTask('${t.id}',\`${t.name}\`,${t.pts},'${t.em}',\`${t.praise||""}\`)" style="flex:1;display:flex;align-items:center;justify-content:space-between;color:#5a4a4a;"><span style="font-size:14px;">${t.em} ${t.name}</span><span class="pts" style="color:#c4868e;">+${t.pts}</span></button><button onclick="rmCT('${t.id}')" style="margin-left:8px;padding:4px 8px;border-radius:6px;font-size:11px;color:#c07070;background:rgba(210,140,140,0.1);">删除</button></div>`;});h+=`</div>`;}h+=`</div>`;h+=`<div style="margin-bottom:20px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div class="section-title" style="color:#c07070;">⚠️ 扣分项</div><button onclick="document.getElementById('cpForm').classList.toggle('hidden')" style="padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600;background:rgba(210,140,140,0.15);color:#c08888;border:1px solid rgba(210,140,140,0.2);">+ 添加</button></div>`;h+=`<div id="cpForm" class="hidden" style="padding:14px;margin-bottom:12px;border-radius:12px;background:rgba(210,140,140,0.06);border:1px solid rgba(210,140,140,0.15);"><div style="margin-bottom:10px;"><div style="font-size:12px;color:#c08888;margin-bottom:4px;">扣分项名称</div><input id="cp_name" class="inp" placeholder="比如：熬夜超过2点"></div><div style="display:flex;gap:10px;margin-bottom:12px;"><div style="flex:1;"><div style="font-size:12px;color:#c08888;margin-bottom:4px;">扣多少分</div><input id="cp_pts" type="number" value="10" class="inp"></div><div style="flex:1;"><div style="font-size:12px;color:#c08888;margin-bottom:4px;">图标</div><input id="cp_em" value="😬" class="inp"></div></div><button onclick="addCP()" style="width:100%;padding:10px;border-radius:8px;font-size:14px;font-weight:600;background:linear-gradient(135deg,#d48888,#c07070);color:#fff;">确认添加</button></div>`;h+=`<div style="display:flex;flex-direction:column;gap:6px;">`;PENS.forEach(p=>{h+=`<button class="pen-btn" onclick="doPen('${p.id}',\`${p.name}\`,${p.pts},'${p.em}')"><span style="font-size:14px;">${p.em} ${p.name}</span><span class="pts" style="color:#c07070;">${p.pts}</span></button>`;});S.cpn.forEach(p=>{h+=`<div style="display:flex;align-items:center;width:100%;padding:12px 14px;background:rgba(210,140,140,0.06);border-radius:10px;border:1px solid rgba(210,140,140,0.15);"><button onclick="doPen('${p.id}',\`${p.name}\`,${p.pts},'${p.em}')" style="flex:1;display:flex;align-items:center;justify-content:space-between;color:#c08888;"><span style="font-size:14px;">${p.em} ${p.name}</span><span class="pts" style="color:#c07070;">${p.pts}</span></button><button onclick="rmCP('${p.id}')" style="margin-left:8px;padding:4px 8px;border-radius:6px;font-size:11px;color:#c07070;background:rgba(210,140,140,0.1);">删除</button></div>`;});h+=`</div></div>`;h+=`<button onclick="doReset()" style="width:100%;padding:10px;border-radius:8px;background:rgba(255,255,255,0.5);border:1px solid rgba(219,147,158,0.15);color:#b09898;font-size:12px;margin-top:10px;">重置所有数据</button>`;document.getElementById("content-tasks").innerHTML=h;}
function renderAttrs(){let h=`<div style="font-size:13px;color:#a08888;margin-bottom:16px;text-align:center;">点击属性查看详情</div><div style="display:flex;flex-direction:column;gap:8px;">`;ATTRS.forEach(a=>{const xp=S.attrs[a.id]||0,lv=getLv(xp),pct=getLvPct(xp),nxt=lv<LVLS.length-1?LVLS[lv+1]:null;const col=lv>=3?"#e8b4b8":lv>=1?"#c4868e":"#8b7fa8";const barCol=lv>=3?"linear-gradient(90deg,#d4a0a0,#e8b4b8)":lv>=1?"linear-gradient(90deg,#c4868e,#c4868e)":"linear-gradient(90deg,#4b5563,#6b7280)";h+=`<div><button onclick="this.nextElementSibling.classList.toggle('hidden');this.style.background=this.nextElementSibling.classList.contains('hidden')?'rgba(255,255,255,0.5)':'rgba(219,147,158,0.1)'" style="width:100%;padding:14px 16px;border-radius:12px;text-align:left;background:rgba(255,255,255,0.5);border:1px solid rgba(219,147,158,0.15);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:18px;">${a.em}</span><span style="font-size:14px;font-weight:600;color:#5a4a4a;">${a.name}</span></div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:12px;font-family:'Outfit';font-weight:700;color:${col};">Lv.${lv}</span><span style="font-size:11px;color:#b09898;font-family:'Outfit';">${xp}${nxt?"/"+nxt:""}</span></div></div><div style="height:4px;border-radius:2px;background:rgba(219,147,158,0.15);overflow:hidden;"><div style="height:100%;border-radius:2px;width:${pct}%;background:${barCol};transition:width 0.5s ease;"></div></div></button><div class="hidden" style="padding:12px 16px;margin-top:4px;border-radius:10px;background:rgba(219,147,158,0.06);border:1px solid rgba(219,147,158,0.15);font-size:13px;color:#8a6a6e;">${a.desc}</div></div>`;});h+=`</div>`;document.getElementById("content-attrs").innerHTML=h;}
function renderShop(){let h="";["s","m","l","x"].forEach(tier=>{const items=SHOP.filter(i=>i.t===tier);if(!items.length)return;h+=`<div style="margin-bottom:20px;"><div style="font-size:13px;font-weight:600;margin-bottom:10px;color:${TIER_COLORS[tier]};letter-spacing:1px;">${TIER_NAMES[tier]}</div><div style="display:flex;flex-direction:column;gap:8px;">`;items.forEach(item=>{const ok=S.cp>=item.cost;const bg=tier==="x"?"linear-gradient(135deg,rgba(199,163,163,0.1),rgba(199,163,163,0.06))":"rgba(255,255,255,0.5)";const brd=tier==="x"?"1px solid rgba(199,163,163,0.25)":"1px solid rgba(219,147,158,0.15)";const anim=tier==="x"?"animation:glow 3s ease-in-out infinite;":"";h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:${bg};border-radius:12px;border:${brd};${anim}"><div><div style="font-size:14px;color:#5a4a4a;">${item.em} ${item.name}</div><div style="font-size:12px;color:#a08888;font-family:'Outfit';margin-top:2px;">${item.cost} 积分</div></div><button onclick="doRedeem(\`${item.name}\`,${item.cost})" style="padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;background:${ok?"linear-gradient(135deg,#c4868e,#d4a0a0)":"rgba(219,147,158,0.2)"};color:${ok?"#fff":"#4b4560"};opacity:${ok?1:0.5};">${ok?"兑换":"攒攒"}</button></div>`;});h+=`</div></div>`;});h+=`<div style="margin-bottom:20px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><div style="font-size:13px;font-weight:600;color:#c4868e;letter-spacing:1px;">🌟 自定义奖励</div><button onclick="document.getElementById('csForm').classList.toggle('hidden')" style="padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600;background:linear-gradient(135deg,#c4868e,#b07078);color:#fff;">+ 上架</button></div>`;h+=`<div id="csForm" class="hidden" style="padding:14px;margin-bottom:12px;border-radius:12px;background:rgba(219,147,158,0.08);border:1px solid rgba(219,147,158,0.2);"><div style="margin-bottom:10px;"><div style="font-size:12px;color:#c4868e;margin-bottom:4px;">奖励名称</div><input id="cs_name" class="inp" placeholder="比如：一双好看的鞋"></div><div style="display:flex;gap:10px;margin-bottom:12px;"><div style="flex:1;"><div style="font-size:12px;color:#c4868e;margin-bottom:4px;">所需积分</div><input id="cs_cost" type="number" value="50" class="inp"></div><div style="flex:1;"><div style="font-size:12px;color:#c4868e;margin-bottom:4px;">图标</div><input id="cs_em" value="🎁" class="inp"></div></div><button onclick="addCS()" style="width:100%;padding:10px;border-radius:8px;font-size:14px;font-weight:600;background:linear-gradient(135deg,#c4868e,#d4a0a0);color:#fff;">确认上架</button></div>`;if(S.cs.length){h+=`<div style="display:flex;flex-direction:column;gap:8px;">`;S.cs.forEach(item=>{const ok=S.cp>=item.cost;h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(219,147,158,0.06);border-radius:12px;border:1px solid rgba(219,147,158,0.15);"><div style="flex:1;"><div style="font-size:14px;color:#5a4a4a;">${item.em} ${item.name}</div><div style="font-size:12px;color:#a08888;font-family:'Outfit';margin-top:2px;">${item.cost} 积分</div></div><button onclick="doRedeem(\`${item.name}\`,${item.cost})" style="padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;background:${ok?"linear-gradient(135deg,#c4868e,#d4a0a0)":"rgba(219,147,158,0.2)"};color:${ok?"#fff":"#4b4560"};opacity:${ok?1:0.5};margin-right:8px;">${ok?"兑换":"攒攒"}</button><button onclick="rmCS('${item.id}')" style="padding:4px 8px;border-radius:6px;font-size:11px;color:#c07070;background:rgba(210,140,140,0.1);">下架</button></div>`;});h+=`</div>`;}h+=`</div>`;document.getElementById("content-shop").innerHTML=h;}
function renderHistory(){let h="";if(!S.h.length){h=`<div style="text-align:center;padding:40px 20px;color:#b09898;font-size:14px;">还没有记录，去完成第一个任务吧！</div>`;}else{h=`<div style="display:flex;flex-direction:column;gap:4px;">`;S.h.forEach(e=>{const col=e.t==="e"?"#c4868e":e.t==="r"?"#c9b8a8":"#c07070";h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(255,255,255,0.02);border-radius:8px;border-left:3px solid ${col};"><div><div style="font-size:13px;color:#6a5555;">${e.n}</div><div style="font-size:11px;color:#b09898;margin-top:2px;">${fmtDate(e.d)}</div></div><div style="font-size:14px;font-weight:700;font-family:'Outfit';color:${col};">${e.p>0?"+"+e.p:e.p}</div></div>`;});h+=`</div>`;}document.getElementById("content-history").innerHTML=h;}
loadState();render();
